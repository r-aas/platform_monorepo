name: vector-store-ops
description: pgvector and qdrant index management, similarity search, and vector lifecycle
version: "1.0.0"
tags: ["vector-db", "embeddings", "search"]

mcp_servers:
  - url: http://genai-litellm.genai.svc.cluster.local:4000/mcp/
    tool_filter: ["postgres_query", "postgres_execute", "qdrant_search", "qdrant_upsert", "qdrant_create_collection", "qdrant_delete_collection"]

prompt_fragment: |
  When working with vector stores:
  - Verify the collection or index exists before querying
  - Use cosine similarity for text embeddings unless instructed otherwise
  - Limit similarity search results to 10 unless the user specifies more
  - Report similarity scores alongside results
  - Always confirm before deleting an index or collection

tasks:
  - name: create-index
    description: Create a new vector index or collection
    inputs:
      - title: collection
        type: string
      - title: vector_size
        type: integer
        default: 768
      - title: distance
        type: string
        default: cosine

  - name: similarity-search
    description: Search for nearest neighbors by embedding similarity
    inputs:
      - title: collection
        type: string
      - title: query
        type: string
      - title: top_k
        type: integer
        default: 10
      - title: embedding_model
        type: string
        default: nomic-embed-text

  - name: upsert-vectors
    description: Insert or update vectors in the store
    inputs:
      - title: collection
        type: string
      - title: records
        type: array
      - title: text_field
        type: string
        default: content

  - name: delete-index
    description: Delete a vector index or collection
    inputs:
      - title: collection
        type: string
