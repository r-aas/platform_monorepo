name: skill-management
description: Create, update, delete, and list skills in the registry
version: "1.0.0"
tags: ["management", "skills"]

mcp_servers:
  - url: http://genai-agent-gateway.genai.svc.cluster.local:8000/mcp
    tool_filter: ["list_skills", "get_skill", "create_skill", "update_skill", "delete_skill"]

prompt_fragment: |
  When managing skills:
  - Check if a skill already exists before creating
  - Show which agents use a skill before deleting
  - Validate MCP server URLs are reachable when creating skills
  - Report version changes after updates

tasks:
  - name: create-skill
    description: Register a new skill with MCP servers and tasks
    inputs:
      - title: name
        type: string
      - title: mcp_servers
        type: array

  - name: list-skills
    description: List all skills with their task counts

  - name: update-skill
    description: Update a skill's MCP servers, tasks, or prompt fragment
    inputs:
      - title: name
        type: string

  - name: delete-skill
    description: Delete a skill from the registry
    inputs:
      - title: name
        type: string
