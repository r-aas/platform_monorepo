name: mlflow-tracking
description: MLflow experiment tracking and model registry
version: "1.0.0"
tags: ["mlops", "tracking"]

mcp_servers:
  - url: http://genai-litellm.genai.svc.cluster.local:4000/mcp/
    tool_filter: ["mlflow_search_experiments", "mlflow_search_runs", "mlflow_get_run", "mlflow_log_metric", "mlflow_create_experiment", "mlflow_list_registered_models"]

prompt_fragment: |
  When working with MLflow:
  - Search experiments before creating new ones to avoid duplicates
  - Use descriptive experiment names with project prefix
  - Log all relevant metrics and parameters
  - Compare runs side-by-side when evaluating models

tasks:
  - name: log-metrics
    description: Log training metrics to an MLflow experiment
    inputs:
      - title: experiment_name
        type: string
      - title: metrics
        type: object
    evaluation:
      dataset: skills/eval/mlflow-tracking/log-metrics.json
      metrics: ["task_completion", "correctness"]

  - name: search-experiments
    description: Search and list MLflow experiments
    inputs:
      - title: query
        type: string

  - name: compare-runs
    description: Compare metrics across multiple MLflow runs
    inputs:
      - title: experiment_name
        type: string
      - title: metric_keys
        type: array
