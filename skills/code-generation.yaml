name: code-generation
description: Generate and modify code with automated test verification and diff review
version: "1.0.0"
tags: ["code", "generation", "testing"]

mcp_servers:
  - url: http://genai-litellm.genai.svc.cluster.local:4000/mcp/
    tool_filter: ["gitlab_create_file", "gitlab_update_file", "gitlab_get_file", "gitlab_list_files", "gitlab_create_merge_request"]

prompt_fragment: |
  When generating or modifying code:
  - Read existing code before making changes to understand conventions and patterns
  - Write tests before writing implementation (TDD)
  - Generate the minimum code required to satisfy the requirement — avoid over-engineering
  - After generating, verify tests pass before presenting the result
  - Review the diff for unintended side-effects before committing
  - Never hardcode configuration values — use environment variables or config objects
  - Follow the language's idiomatic style (uv for Python, npx for Node)

tasks:
  - name: generate-code
    description: Generate new code for a described feature or function in the target language
    inputs:
      - title: description
        type: string
      - title: language
        type: string
        default: python
      - title: target_file
        type: string

  - name: modify-code
    description: Apply a targeted modification to an existing code file
    inputs:
      - title: file_path
        type: string
      - title: change_description
        type: string
      - title: context
        type: string
        default: ""
        description: Additional context about the codebase or constraints

  - name: verify-tests
    description: Run the test suite for the modified code and return pass/fail summary
    inputs:
      - title: test_command
        type: string
        default: "uv run pytest -q"
      - title: working_dir
        type: string

  - name: review-diff
    description: Summarize the diff of recent changes and flag potential issues
    inputs:
      - title: file_paths
        type: string
        description: Comma-separated list of changed file paths
      - title: checklist
        type: string
        default: "security,performance,style,test-coverage"
