name: data-ingestion
description: Read data from S3/GCS, transform, and load to postgres or vector store
version: "1.0.0"
tags: ["data", "etl", "ingestion"]

mcp_servers:
  - url: http://genai-litellm.genai.svc.cluster.local:4000/mcp/
    tool_filter: ["postgres_query", "postgres_execute", "s3_get_object", "s3_list_objects", "gcs_read_object", "gcs_list_objects"]

prompt_fragment: |
  When ingesting data:
  - List available objects before reading to understand the source structure
  - Validate schema before loading to avoid corrupt records
  - Prefer batch inserts over row-by-row for postgres targets
  - For vector store targets, generate embeddings before upsert
  - Report row counts and any skipped/errored records

tasks:
  - name: ingest-s3
    description: Read objects from an S3 bucket and stage for transformation
    inputs:
      - title: bucket
        type: string
      - title: prefix
        type: string
        default: ""
      - title: file_format
        type: string
        default: json

  - name: ingest-gcs
    description: Read objects from a GCS bucket and stage for transformation
    inputs:
      - title: bucket
        type: string
      - title: prefix
        type: string
        default: ""
      - title: file_format
        type: string
        default: json

  - name: load-postgres
    description: Load transformed records into a postgres table
    inputs:
      - title: table
        type: string
      - title: schema
        type: string
        default: public
      - title: if_exists
        type: string
        default: append

  - name: load-vector-store
    description: Embed and upsert records into the pgvector vector store
    inputs:
      - title: collection
        type: string
      - title: text_field
        type: string
        default: content
      - title: embedding_model
        type: string
        default: nomic-embed-text
