name: documentation
description: Generate and maintain documentation from code, specs, and conversations
version: "1.0.0"
tags: ["docs", "documentation", "generation"]

mcp_servers:
  - url: http://genai-litellm.genai.svc.cluster.local:4000/mcp/
    tool_filter: ["gitlab_browse_files", "gitlab_manage_files", "gitlab_browse_wiki", "gitlab_manage_wiki"]

prompt_fragment: |
  When generating documentation:
  - Extract intent and context from code, not just surface-level signatures
  - Structure docs for the intended audience: user guides differ from API references
  - Use concrete examples — abstract descriptions without examples are rarely useful
  - Keep docs co-located with what they describe; don't create orphaned doc files
  - When updating docs, verify accuracy against current code before committing
  - For API specs, derive from actual request/response shapes, not assumptions
  - Summarize conversations to capture decisions and rationale, not just outcomes

tasks:
  - name: generate-docs
    description: Generate documentation for a code module, service, or feature from source files
    inputs:
      - title: source_path
        type: string
        description: File path or directory to document
      - title: doc_type
        type: string
        description: "Type of doc to generate: readme, api-reference, user-guide, architecture"
        default: readme
      - title: output_path
        type: string
        description: Where to write the generated documentation

  - name: update-docs
    description: Update existing documentation to reflect code changes in a diff or commit
    inputs:
      - title: doc_path
        type: string
        description: Path to the documentation file to update
      - title: diff
        type: string
        description: Git diff or change description to incorporate

  - name: extract-api-spec
    description: Extract an OpenAPI or JSON schema spec from FastAPI or Pydantic source code
    inputs:
      - title: source_path
        type: string
        description: Path to the FastAPI app or Pydantic models
      - title: output_format
        type: string
        description: "Output format: openapi, jsonschema"
        default: openapi

  - name: summarize-conversation
    description: Summarize a Claude Code session or conversation into decisions, rationale, and next steps
    inputs:
      - title: conversation
        type: string
        description: Raw conversation text or transcript
      - title: focus
        type: string
        description: "What to focus on: decisions, architecture, bugs, all"
        default: all
