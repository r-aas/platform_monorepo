name: security-audit
description: Scan code and infrastructure for vulnerabilities and generate remediation reports
version: "1.0.0"
tags: ["security", "audit", "vulnerability"]

mcp_servers:
  - url: http://genai-metamcp.genai.svc.cluster.local:12008/metamcp/genai/mcp
    tool_filter: ["gitlab_browse_files", "gitlab_browse_commits", "kubectl_get", "kubectl_describe"]

prompt_fragment: |
  When performing security audits:
  - Prioritize by severity: critical (RCE, auth bypass) > high (data exposure) > medium > low
  - Check OWASP Top 10 categories systematically: injection, broken auth, sensitive data, XXE, IDOR, misconfiguration, XSS, deserialization, known vulnerabilities, logging gaps
  - For infrastructure: check RBAC permissions, network policies, secret management, image provenance
  - Report findings with: severity, location, description, and a concrete remediation step
  - Never report theoretical issues without evidence from the scanned artifacts
  - Distinguish between vulnerabilities (exploitable now) and hardening recommendations (reduce attack surface)

tasks:
  - name: scan-code
    description: Scan source code for security vulnerabilities including injection, auth issues, and insecure dependencies
    inputs:
      - title: source_path
        type: string
        description: File path or directory to scan
      - title: language
        type: string
        description: "Programming language: python, javascript, go, any"
        default: any
      - title: severity_threshold
        type: string
        description: "Minimum severity to report: critical, high, medium, low"
        default: medium

  - name: scan-infra
    description: Audit Kubernetes manifests, Helm charts, and RBAC configs for security misconfigurations
    inputs:
      - title: target
        type: string
        description: Namespace, deployment name, or path to k8s manifest files
      - title: checks
        type: string
        description: "Checks to run: rbac, network-policies, pod-security, secrets, all"
        default: all

  - name: fix-vulnerabilities
    description: Apply remediation patches for identified vulnerabilities and verify the fix
    inputs:
      - title: finding_id
        type: string
        description: Vulnerability finding ID from scan-code or scan-infra output
      - title: fix_strategy
        type: string
        description: "Strategy: patch, workaround, suppress (with justification)"
        default: patch

  - name: generate-report
    description: Compile scan findings into a structured security report with severity breakdown and remediation plan
    inputs:
      - title: scan_results
        type: string
        description: JSON or text output from scan-code or scan-infra
      - title: report_format
        type: string
        description: "Output format: markdown, json, sarif"
        default: markdown
