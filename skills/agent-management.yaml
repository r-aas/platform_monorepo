name: agent-management
description: Create, update, delete, and list agents
version: "1.0.0"
tags: ["management", "agents"]

mcp_servers:
  - url: http://genai-agent-gateway.genai.svc.cluster.local:8000/mcp
    tool_filter: ["list_agents", "get_agent", "create_agent", "update_agent", "delete_agent"]

prompt_fragment: |
  When managing agents:
  - List existing agents before creating duplicates
  - Verify skill references exist before assigning to agents
  - Confirm destructive actions (delete) before executing
  - Report the full agent definition after creation or update

tasks:
  - name: create-agent
    description: Create a new agent with specified skills and config
    inputs:
      - title: name
        type: string
      - title: skills
        type: array

  - name: list-agents
    description: List all available agents with their skills

  - name: update-agent
    description: Update an existing agent's skills or config
    inputs:
      - title: name
        type: string

  - name: delete-agent
    description: Delete an agent by name
    inputs:
      - title: name
        type: string
