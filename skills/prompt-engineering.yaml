name: prompt-engineering
description: Optimize system prompts via A/B evaluation using MLflow experiment tracking
version: "1.0.0"
tags: ["prompt", "optimization", "eval"]

mcp_servers:
  - url: http://genai-litellm.genai.svc.cluster.local:4000/mcp/
    tool_filter: ["mlflow_create_experiment", "mlflow_log_metric", "mlflow_log_param", "mlflow_search_runs", "mlflow_get_run"]

prompt_fragment: |
  When optimizing prompts:
  - Start by defining a clear evaluation metric (e.g. pass rate, latency, user rating)
  - Generate multiple variant prompts that differ in tone, structure, or specificity
  - Run each variant against the same eval dataset for a fair comparison
  - Log all variants and scores to MLflow for reproducibility
  - Apply the best-scoring variant only after it beats the baseline by a meaningful margin
  - Prefer smaller, targeted edits over wholesale rewrites when iterating

tasks:
  - name: design-variants
    description: Generate N prompt variants for a given base prompt and evaluation goal
    inputs:
      - title: base_prompt
        type: string
      - title: goal
        type: string
      - title: n_variants
        type: integer
        default: 3

  - name: run-evals
    description: Run an eval dataset against a prompt variant and return pass rate and latency
    inputs:
      - title: prompt_variant
        type: string
      - title: eval_dataset
        type: string
        description: Name of the eval dataset registered in the skill registry
      - title: experiment_name
        type: string
        default: prompt-optimization

  - name: compare-results
    description: Query MLflow for all runs in an experiment and rank by metric
    inputs:
      - title: experiment_name
        type: string
      - title: metric
        type: string
        default: pass_rate

  - name: apply-best
    description: Update the skill or agent system prompt to the best-performing variant
    inputs:
      - title: skill_name
        type: string
      - title: experiment_name
        type: string
      - title: metric
        type: string
        default: pass_rate
