# ── External (not managed by us) ───────────────────────────────────────

ollama:
  type: llm_inference
  managed: false
  description: Native Mac LLM inference (Metal GPU). NOT containerized.
  exposes:
    - name: openai-compat
      host: "192.168.65.254"
      port: 11434
      protocol: http
  consumes: []
  taxonomy_type: llm_gateway

# ── Ontology Engine ────────────────────────────────────────────────────

open-ontologies:
  type: knowledge_engine
  chart: genai-open-ontologies
  namespace: genai
  description: OWL2/SHACL/SPARQL engine for domain ontologies.
  exposes:
    - name: sparql
      port: 8080
      protocol: http
      purpose: SPARQL queries + OWL2 reasoning
  consumes: []

# ── Scheduling ──────────────────────────────────────────────────────────

agent-schedules:
  type: scheduler
  chart: genai-agent-schedules
  namespace: genai
  description: CronJobs that POST tasks to kagent A2A endpoints.
  exposes: []
  consumes:
    - component: kagent
      interface: a2a-api
      purpose: Scheduled agent task invocation
