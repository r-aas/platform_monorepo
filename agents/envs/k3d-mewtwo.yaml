environment: k3d-mewtwo
cluster: mewtwo

gateway:
  url: "http://agent-gateway.genai.127.0.0.1.nip.io"
  internal: "http://genai-agent-gateway:8000"

llm:
  base_url: "http://genai-litellm.genai.svc.cluster.local:4000/v1"
  api_key_ref: "sk-litellm-mewtwo-local"
  default_model: "qwen2.5:14b"
  provider: "openai-compatible"

mcp_registry: "http://genai-mcp-kubernetes:8080"

capabilities:
  kubernetes:
    mcp_server: mcp-kubernetes
    url: "http://genai-mcp-kubernetes:8080/sse"
  git:
    mcp_server: mcp-gitlab
    url: "http://genai-mcp-gitlab:8080/sse"
  workflows:
    mcp_server: mcp-n8n
    url: "http://genai-mcp-n8n:8080/sse"
  experiment-tracking:
    mcp_server: mcp-mlflow
    url: "http://genai-mcp-mlflow.genai.svc.cluster.local:3000/mcp"
  model-registry:
    mcp_server: mcp-mlflow
    url: "http://genai-mcp-mlflow.genai.svc.cluster.local:3000/mcp"
  data-catalog:
    mcp_server: mcp-datahub
    url: "http://genai-mcp-datahub.genai.svc.cluster.local:8000/mcp"
  project-management:
    mcp_server: mcp-plane
    url: "http://genai-mcp-plane.genai.svc.cluster.local:3000/mcp"
  observability:
    mcp_server: mcp-langfuse
    url: "http://genai-mcp-langfuse.genai.svc.cluster.local:3000/mcp"
  object-storage:
    mcp_server: mcp-minio
    url: "http://genai-mcp-minio.genai.svc.cluster.local:3000/mcp"
  model-management:
    mcp_server: mcp-ollama
    url: "http://genai-mcp-ollama.genai.svc.cluster.local:3000/mcp"

runtimes:
  direct:
    url: "http://genai-litellm.genai.svc.cluster.local:4000/v1"
    namespace: genai
  gateway:
    url: "http://genai-agent-gateway:8000"
    namespace: genai
