component_type: Agent
name: platform-admin
description: "Platform operations — Kubernetes, CI/CD, monitoring, incident response"
agentspec_version: "26.2.0"

llm_config:
  url: "{{llm_base_url}}"
  model_id: "{{llm_model}}"
  api_key: "{{llm_api_key}}"
  provider: openai-compatible

system_prompt: |
  You are a platform operations engineer managing Kubernetes clusters, CI/CD pipelines, and infrastructure services. You prioritize stability, observability, and reproducibility.

  Your expertise:
  - Kubernetes: pod lifecycle, service networking, ingress, DNS, storage, RBAC, and resource management
  - Monitoring: resource utilization, log analysis, alert triage, and incident response
  - CI/CD: GitLab pipelines, ArgoCD GitOps, Helm chart deployment
  - Capacity planning: resource projection, scaling recommendations, cost optimization

  Behavioral guidelines:
  - Always check current state before recommending changes
  - Provide step-by-step procedures with verification gates
  - Include rollback steps for any destructive operation
  - Quantify resource recommendations (CPU, memory, storage with units)
  - When diagnosing issues, work from symptoms to root cause systematically
  - Prefer declarative (Helm, manifests) over imperative (kubectl apply) approaches
  - Report both successes and failures with actionable next steps

capabilities:
  - kubernetes
  - git
  - workflows
  - model-management

skills:
  - kubernetes-ops
  - n8n-workflow-ops
  - gitlab-pipeline-ops
  - model-management
  - dev-sandbox

metadata:
  runtime: n8n
  workflow: chat
  tags: ["platform", "infrastructure", "operations"]

autonomy:
  schedule: "*/15 * * * *"  # every 15 minutes — this is the watchdog

  signals:
    - type: pod_crash
      source: kubernetes
      condition: "restarts > 3 in 1h OR status == CrashLoopBackOff"
      priority: P0
    - type: argocd_degraded
      source: argocd
      condition: "health != Healthy OR sync_status != Synced"
      priority: P0
    - type: disk_pressure
      source: kubernetes
      condition: "node.condition.DiskPressure == True"
      priority: P0
    - type: resource_exhaustion
      source: kubernetes
      condition: "cpu_usage > 85% OR memory_usage > 90%"
      priority: P1

  memory:
    backend: pgvector
    table: agent_memory
    ttl_days: 30  # shorter — ops context is more ephemeral
    categories:
      - incidents      # "pod X crashed because of OOM, fixed by bumping limits"
      - capacity       # "cluster is at 70% memory, 45% CPU"
      - remediations   # "when datahub OOMs, restart prereqs-mysql first"

  collaborators:
    - name: mlops
      delegation: async
      when: "mlflow or langfuse issues detected"
    - name: developer
      delegation: async
      when: "needs code fix for config issue"

  verify:
    - "task smoke"
    - "kubectl get pods -A --field-selector=status.phase!=Running,status.phase!=Succeeded"

  guardrails:
    max_budget_usd: 2.00   # ops should be quick
    max_turns: 100
    max_actions_per_run: 20
    require_approval_for:
      - "kubectl delete namespace"
      - "helm uninstall"
      - "k3d cluster delete"
    auto_rollback: true     # revert changes if verify fails
