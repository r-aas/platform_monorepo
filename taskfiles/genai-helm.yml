version: "3"

vars:
  CHARTS_DIR: "{{.ROOT_DIR}}/charts"
  GENAI_NS: genai

tasks:
  deploy:
    desc: Deploy full genai stack to k3d (infra + apps)
    cmds:
      - task: infra-up
      - task: apps-up

  infra-up:
    desc: Deploy genai infrastructure tier (databases, MinIO, Neo4j)
    dir: "{{.CHARTS_DIR}}"
    cmds:
      - helm dependency update genai-infra
      - >-
        helm upgrade --install genai-infra genai-infra
        -f genai-infra/values.yaml
        -f genai-infra/values-k3d.yaml
        --namespace {{.GENAI_NS}} --create-namespace
        --wait --timeout 300s

  apps-up:
    desc: Deploy genai application tier (n8n, MLflow, Langfuse, LiteLLM)
    dir: "{{.CHARTS_DIR}}"
    cmds:
      - helm dependency update genai-apps
      - >-
        helm upgrade --install genai-apps genai-apps
        -f genai-apps/values.yaml
        -f genai-apps/values-k3d.yaml
        --namespace {{.GENAI_NS}}
        --wait --timeout 300s

  status:
    desc: Show genai Helm releases and pod status
    cmds:
      - helm list --namespace {{.GENAI_NS}}
      - echo ""
      - kubectl get pods --namespace {{.GENAI_NS}} -o wide

  teardown:
    desc: Uninstall genai stack from k3d
    prompt: "Remove all genai releases from k3d?"
    cmds:
      - helm uninstall genai-apps --namespace {{.GENAI_NS}} --ignore-not-found
      - helm uninstall genai-infra --namespace {{.GENAI_NS}} --ignore-not-found
      - echo "Releases removed. PVCs retained."

  infra-down:
    desc: Uninstall only the infrastructure tier
    prompt: "Remove genai-infra release? Data in PVCs will be retained."
    cmds:
      - helm uninstall genai-infra --namespace {{.GENAI_NS}} --ignore-not-found

  apps-down:
    desc: Uninstall only the application tier
    cmds:
      - helm uninstall genai-apps --namespace {{.GENAI_NS}} --ignore-not-found

  lint:
    desc: Lint all genai charts
    dir: "{{.CHARTS_DIR}}"
    cmds:
      - helm lint genai-infra -f genai-infra/values.yaml
      - helm lint litellm
      - helm lint streaming-proxy
      - helm lint mcp-gateway

  template:
    desc: Render templates without installing (dry-run)
    dir: "{{.CHARTS_DIR}}"
    cmds:
      - helm template genai-infra genai-infra -f genai-infra/values.yaml -f genai-infra/values-k3d.yaml --namespace {{.GENAI_NS}}

  logs:
    desc: "Show logs for a genai pod (usage: task genai-helm:logs -- <pod-name-prefix>)"
    cmds:
      - kubectl logs -n {{.GENAI_NS}} -l app.kubernetes.io/name={{.CLI_ARGS}} --tail=100 -f
