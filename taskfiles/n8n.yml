version: "3"

vars:
  NS: dev
  N8N_MANIFESTS: "{{.PLATFORM_DIR}}/n8n"
  N8N_SCRIPTS: "{{.PLATFORM_DIR}}/../scripts"
  NAMESPACES: "dev stage prod"

tasks:
  preflight:
    desc: "Check VM has enough free memory for n8n stack"
    silent: true
    cmds:
      - |
        AVAIL=$(docker exec k3d-mewtwo-server-0 awk '/MemAvailable/ {print int($2/1024)}' /proc/meminfo 2>/dev/null || echo 0)
        if [ "$AVAIL" -lt 1500 ]; then
          echo "⚠ Only ${AVAIL}MB available on k3d VM (need ≥1500MB)"
          echo "  Stop competing containers or free memory on Colima VM"
          exit 1
        fi
        echo "✓ ${AVAIL}MB available on k3d VM — sufficient"

  deploy:
    desc: "Deploy n8n + postgres to a namespace (NS=dev|stage|prod)"
    deps: [preflight]
    cmds:
      - bash {{.N8N_SCRIPTS}}/n8n-init-secrets.sh {{.NS}}
      - cmd: NAMESPACE={{.NS}} envsubst < {{.N8N_MANIFESTS}}/postgres.yaml | kubectl apply -f -
      - cmd: NAMESPACE={{.NS}} envsubst < {{.N8N_MANIFESTS}}/n8n.yaml | kubectl apply -f -
      - 'echo "✓ n8n deployed to {{.NS}} → http://n8n.{{.NS}}.127.0.0.1.nip.io"'

  deploy-all:
    desc: "Deploy n8n to all namespaces (dev, stage, prod)"
    deps: [preflight]
    cmds:
      - for: {var: NAMESPACES}
        task: deploy
        vars:
          NS: "{{.ITEM}}"
      - task: setup

  teardown:
    desc: "Remove n8n + postgres from a namespace (NS=dev|stage|prod)"
    prompt: "Delete n8n from {{.NS}}?"
    cmds:
      - cmd: NAMESPACE={{.NS}} envsubst < {{.N8N_MANIFESTS}}/n8n.yaml | kubectl delete --ignore-not-found -f -
      - cmd: NAMESPACE={{.NS}} envsubst < {{.N8N_MANIFESTS}}/postgres.yaml | kubectl delete --ignore-not-found -f -
      - kubectl delete secret n8n-secrets -n {{.NS}} --ignore-not-found
      - 'echo "✓ n8n removed from {{.NS}}"'

  teardown-all:
    desc: "Remove n8n from all namespaces"
    prompt: "Delete n8n from ALL namespaces (dev, stage, prod)?"
    cmds:
      - for: {var: NAMESPACES}
        task: teardown
        vars:
          NS: "{{.ITEM}}"

  status:
    desc: "Show n8n status across all namespaces"
    cmds:
      - |
        for NS in dev stage prod; do
          echo "── $NS ──────────────────────────────────"
          kubectl get pods,svc,ingress -n "$NS" -l app=n8n 2>/dev/null || true
          kubectl get pods,svc -n "$NS" -l app=n8n-postgres 2>/dev/null || true
          echo ""
        done

  logs:
    desc: "Tail n8n logs (NS=dev|stage|prod)"
    cmds:
      - kubectl logs -n {{.NS}} deploy/n8n -f --tail=100

  logs-postgres:
    desc: "Tail postgres logs (NS=dev|stage|prod)"
    cmds:
      - kubectl logs -n {{.NS}} deploy/n8n-postgres -f --tail=100

  shell:
    desc: "Shell into n8n pod (NS=dev|stage|prod)"
    cmds:
      - kubectl exec -it -n {{.NS}} deploy/n8n -- sh

  url:
    desc: "Print n8n URLs for all namespaces"
    cmds:
      - |
        echo "n8n URLs:"
        echo "  dev:   http://n8n.platform.127.0.0.1.nip.io"
        echo "  stage: http://n8n.platform.127.0.0.1.nip.io"
        echo "  prod:  http://n8n.platform.127.0.0.1.nip.io"

  restart:
    desc: "Restart n8n in a namespace (NS=dev|stage|prod)"
    cmds:
      - kubectl rollout restart -n {{.NS}} deploy/n8n
      - kubectl rollout status -n {{.NS}} deploy/n8n --timeout=120s

  setup:
    desc: "Create owner accounts + API keys for all n8n instances"
    cmds:
      - bash {{.N8N_SCRIPTS}}/n8n-setup-api.sh {{.NAMESPACES}}

  health:
    desc: "Check n8n health across all namespaces"
    cmds:
      - |
        for NS in dev stage prod; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://n8n.$NS.127.0.0.1.nip.io/healthz" 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✓ $NS: healthy (200)"
          else
            echo "✗ $NS: unhealthy ($STATUS)"
          fi
        done

  promote:
    desc: "Promote workflows to k8s n8n (NS=dev|stage|prod)"
    cmds:
      - bash {{.PLATFORM_DIR}}/scripts/n8n-promote.sh {{.NS}}
      - bash {{.PLATFORM_DIR}}/scripts/n8n-verify.sh {{.NS}}

  promote-all:
    desc: "Promote workflows to all namespaces"
    cmds:
      - for: {var: NAMESPACES}
        task: promote
        vars: { NS: "{{.ITEM}}" }

  setup-credentials:
    desc: "Create Ollama credential in n8n (NS=dev|stage|prod)"
    cmds:
      - |
        API_KEY=$(kubectl get secret n8n-secrets -n {{.NS}} -o jsonpath='{.data.api-key}' | base64 -d)
        if [ -z "$API_KEY" ]; then
          echo "✗ No API key in n8n-secrets/{{.NS}}. Run: task n8n:setup"
          exit 1
        fi
        HOST="n8n.{{.NS}}.127.0.0.1.nip.io"
        # Check if Ollama credential exists
        EXISTS=$(curl -s "http://$HOST/api/v1/credentials" -H "X-N8N-API-KEY: $API_KEY" | \
          python3 -c "import sys,json; d=json.load(sys.stdin); creds=d.get('data',d); print('yes' if any(c.get('name')=='Ollama Local' and c.get('type')=='ollamaApi' for c in (creds if isinstance(creds,list) else [])) else 'no')" 2>/dev/null || echo "no")
        if [ "$EXISTS" = "yes" ]; then
          echo "✓ Ollama credential already exists in {{.NS}}"
          exit 0
        fi
        # Create it
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://$HOST/api/v1/credentials" \
          -H "Content-Type: application/json" -H "X-N8N-API-KEY: $API_KEY" \
          -d '{"name":"Ollama Local","type":"ollamaApi","data":{"baseUrl":"http://host.docker.internal:11434"}}')
        if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
          echo "✓ Ollama credential created in {{.NS}}"
        else
          echo "✗ Failed to create credential (HTTP $HTTP)"
          exit 1
        fi
