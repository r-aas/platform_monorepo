version: "3"

vars:
  GITLAB_URL: '{{.GITLAB_URL | default "http://gitlab.mewtwo.127.0.0.1.nip.io"}}'
  REGISTRY_URL: '{{.REGISTRY_URL | default "registry.mewtwo.127.0.0.1.nip.io"}}'
  GITLAB_NS: '{{.GITLAB_NS | default "platform"}}'
  CHARTS_DIR: '{{.ROOT_DIR}}/charts'

tasks:
  deploy:
    desc: Deploy GitLab CE + Runner to k3d via Helm
    cmds:
      - >-
        helm upgrade --install gitlab-ce {{.CHARTS_DIR}}/gitlab-ce
        -f {{.CHARTS_DIR}}/gitlab-ce/values.yaml
        -f {{.CHARTS_DIR}}/gitlab-ce/values-k3d.yaml
        --namespace {{.GITLAB_NS}} --create-namespace
        --timeout 600s
      - echo ""
      - echo "GitLab CE deploying to k3d (takes ~5 min for first boot)."
      - echo "Monitor progress:"
      - echo "  kubectl get pods -n {{.GITLAB_NS}} -l app.kubernetes.io/name=gitlab-ce -w"
      - echo ""
      - 'echo "GitLab: {{.GITLAB_URL}}"'
      - 'echo "Registry: http://{{.REGISTRY_URL}}"'

  stop:
    desc: Uninstall GitLab CE from k3d
    prompt: "Remove GitLab CE from k3d? PVC data will be retained."
    cmds:
      - helm uninstall gitlab-ce --namespace {{.GITLAB_NS}} --ignore-not-found
      - echo "GitLab removed. PVCs retained — data survives re-deploy."

  status:
    desc: Check GitLab CE status
    cmds:
      - echo "=== Helm release ==="
      - helm status gitlab-ce --namespace {{.GITLAB_NS}} 2>/dev/null || echo "Not installed"
      - echo ""
      - echo "=== Pods ==="
      - kubectl get pods -n {{.GITLAB_NS}} -l app.kubernetes.io/name=gitlab-ce -o wide 2>/dev/null || true
      - kubectl get pods -n {{.GITLAB_NS}} -l app.kubernetes.io/name=gitlab-runner -o wide 2>/dev/null || true
      - echo ""
      - echo "=== Ingress ==="
      - kubectl get ingress -n {{.GITLAB_NS}} -l app.kubernetes.io/name=gitlab-ce 2>/dev/null || true
      - echo ""
      - echo "=== PVCs ==="
      - kubectl get pvc -n {{.GITLAB_NS}} -l app.kubernetes.io/name=gitlab-ce 2>/dev/null || true

  logs:
    desc: Tail GitLab CE logs
    cmds:
      - kubectl logs -n {{.GITLAB_NS}} -l app.kubernetes.io/name=gitlab-ce --tail=100 -f

  password:
    desc: Get initial root password
    cmds:
      - |
        POD=$(kubectl get pods -n {{.GITLAB_NS}} -l app.kubernetes.io/name=gitlab-ce -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -n "$POD" ]; then
          kubectl exec -n {{.GITLAB_NS}} "$POD" -- cat /etc/gitlab/initial_root_password 2>/dev/null | grep Password || \
            echo "Password file expired. Use: task gitlab:reset-password"
        else
          echo "GitLab pod not found. Is it deployed? (task gitlab:deploy)"
        fi

  reset-password:
    desc: Reset GitLab root password
    cmds:
      - |
        POD=$(kubectl get pods -n {{.GITLAB_NS}} -l app.kubernetes.io/name=gitlab-ce -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -n {{.GITLAB_NS}} "$POD" -- \
          gitlab-rails runner "user = User.find_by(username: 'root'); user.password = 'changeme123'; user.password_confirmation = 'changeme123'; user.save!"
        echo "Root password reset. Login: root / changeme123"

  runner-register:
    desc: "Register runner with token (usage: task gitlab:runner-register -- TOKEN)"
    cmds:
      - |
        RUNNER_POD=$(kubectl get pods -n {{.GITLAB_NS}} -l app.kubernetes.io/name=gitlab-runner -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$RUNNER_POD" ]; then
          echo "Runner pod not found. Is GitLab deployed with runner.enabled=true?"
          exit 1
        fi
        kubectl exec -n {{.GITLAB_NS}} "$RUNNER_POD" -- \
          gitlab-runner register \
            --non-interactive \
            --url "http://gitlab-ce.{{.GITLAB_NS}}.svc.cluster.local" \
            --token "{{.CLI_ARGS}}" \
            --executor kubernetes \
            --kubernetes-namespace {{.GITLAB_NS}} \
            --kubernetes-image alpine:latest \
            --kubernetes-pull-policy if-not-present
        echo "Runner registered with kubernetes executor."

  runner-restart:
    desc: Restart GitLab Runner pod
    cmds:
      - kubectl rollout restart deployment -n {{.GITLAB_NS}} -l app.kubernetes.io/name=gitlab-runner

  wait:
    desc: Wait for GitLab to be ready (up to 5 min)
    cmds:
      - |
        echo "Waiting for GitLab readiness..."
        kubectl wait --for=condition=ready pod \
          -n {{.GITLAB_NS}} -l app.kubernetes.io/name=gitlab-ce \
          --timeout=300s 2>/dev/null && echo "GitLab is ready!" || \
          echo "WARN: GitLab not ready after 5 min — check: task gitlab:logs"

  url:
    desc: Print GitLab URLs
    cmds:
      - 'echo "GitLab:   {{.GITLAB_URL}}"'
      - 'echo "Registry: http://{{.REGISTRY_URL}}"'

