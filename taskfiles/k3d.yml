version: "3"

vars:
  K3D_CLUSTER: '{{.K3D_CLUSTER | default "mewtwo"}}'
  K3D_CONFIG: '{{.K3D_CONFIG | default "${HOME}/work/k3d-mewtwo.yaml"}}'

tasks:
  cluster-up:
    desc: Create shared k3d cluster and configure it
    cmds:
      - task: cluster-create
      - task: cluster-configure

  cluster-create:
    desc: Create k3d cluster (skip if exists)
    internal: true
    cmds:
      - k3d cluster create --config {{.K3D_CONFIG}}
      - echo "Waiting for nodes..."
      - kubectl wait --for=condition=Ready nodes --all --timeout=120s
    status:
      - k3d cluster list -o json | jq -e '.[] | select(.name == "{{.K3D_CLUSTER}}")'

  cluster-configure:
    desc: Apply post-create fixes (DNS, local-path, registry). Idempotent — safe to re-run.
    cmds:
      - task: fix-node-dns
      - kubectl rollout restart deploy coredns -n kube-system
      - kubectl rollout status deploy coredns -n kube-system --timeout=30s
      - task: fix-local-path
      - echo "  ✓ Cluster k3d-{{.K3D_CLUSTER}} configured."

  cluster-down:
    desc: Delete shared k3d cluster (PV data preserved)
    cmds:
      - k3d cluster delete {{.K3D_CLUSTER}}

  cluster-start:
    desc: Start stopped cluster
    cmds:
      - k3d cluster start {{.K3D_CLUSTER}}
      - kubectl wait --for=condition=Ready nodes --all --timeout=120s
      - task: cluster-configure

  cluster-stop:
    desc: Stop cluster without deleting
    cmds:
      - k3d cluster stop {{.K3D_CLUSTER}}

  fix-local-path:
    desc: Fix local-path provisioner to use overlay FS (supports chown)
    internal: true
    cmds:
      - |
        kubectl get configmap local-path-config -n kube-system -o json | \
          python3 -c "
        import json, sys
        cm = json.load(sys.stdin)
        config = json.loads(cm['data']['config.json'])
        config['nodePathMap'][0]['paths'] = ['/var/lib/rancher/k3s/local-storage']
        cm['data']['config.json'] = json.dumps(config)
        json.dump(cm, sys.stdout)
        " | kubectl apply --server-side --force-conflicts -f -
      - kubectl rollout restart deploy local-path-provisioner -n kube-system
      - kubectl rollout status deploy local-path-provisioner -n kube-system --timeout=90s

  fix-node-dns:
    desc: Add fallback DNS + registry /etc/hosts to k3d nodes
    internal: true
    cmds:
      - |
        # Get Docker gateway IP for GitLab network (registry runs on docker-compose)
        GATEWAY=$(docker network inspect platform_monorepo_gitlab --format '{{`{{(index .IPAM.Config 0).Gateway}}`}}' 2>/dev/null || echo "172.23.0.1")
        for node in $(docker ps --filter name=k3d-{{.K3D_CLUSTER}} --format '{{`{{.Names}}`}}'); do
          # Fallback DNS — 8.8.8.8 ensures external resolution works even if
          # Colima VM resolver (192.168.5.2) is unavailable (Tailscale not connected, etc)
          docker exec $node sh -c 'grep -q "8.8.8.8" /etc/resolv.conf || echo "nameserver 8.8.8.8" >> /etc/resolv.conf'
          # Registry DNS — k3d nodes need to reach GitLab container registry via hostname
          docker exec $node sh -c "grep -q 'registry.mewtwo.127.0.0.1.nip.io' /etc/hosts || echo '${GATEWAY} registry.mewtwo.127.0.0.1.nip.io' >> /etc/hosts"
        done

  status:
    desc: Show cluster status
    cmds:
      - echo "=== Cluster ==="
      - k3d cluster list
      - echo ""
      - echo "=== Nodes ==="
      - kubectl get nodes -o wide

  kubeconfig:
    desc: Print kubeconfig for shared cluster
    cmds:
      - k3d kubeconfig get {{.K3D_CLUSTER}}

  context:
    desc: Switch kubectl context to shared cluster
    cmds:
      - kubectl config use-context k3d-{{.K3D_CLUSTER}}
