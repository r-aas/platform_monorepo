version: "3"

tasks:
  scaffold:
    desc: Create .env from .env.example if missing
    cmds:
      - cp -n .env.example .env 2>/dev/null || true
      - echo ".env ready (edit as needed)"
    status:
      - test -f .env

  check:
    desc: Verify required env vars are set
    cmds:
      - |
        missing=0
        while IFS= read -r line; do
          var=$(echo "$line" | sed -n 's/^\([A-Z_][A-Z_0-9]*\)=.*/\1/p')
          if [ -n "$var" ]; then
            if [ -z "${!var:-}" ]; then
              echo "MISSING: $var"
              missing=$((missing + 1))
            fi
          fi
        done < .env.example
        if [ "$missing" -gt 0 ]; then
          echo "$missing env var(s) missing"
          exit 1
        fi
        echo "All env vars set"

  show:
    desc: Show current .env values (redacted)
    cmds:
      - |
        if [ -f .env ]; then
          sed 's/=.*/=***/' .env
        else
          echo "No .env file found"
        fi
