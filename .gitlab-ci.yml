# ─────────────────────────────────────────────────────────────────────────────
# Platform Monorepo — GitLab CI/CD Pipeline
#
# Validates Helm charts, lints Python code, runs agent-gateway tests,
# and triggers eval benchmarks against the live gateway.
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - lint
  - test
  - validate
  - eval

# ── Lint ──────────────────────────────────────────────────────────────────────

python-lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install -q uv
    - cd services/agent-gateway && uv sync --frozen 2>/dev/null || uv sync
  script:
    - cd services/agent-gateway && uv run ruff check src/
    - cd services/agent-gateway && uv run ruff format --check src/
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - changes:
        - services/agent-gateway/**/*

helm-lint:
  stage: lint
  image:
    name: alpine/helm:3.16.3
    entrypoint: [""]
  script:
    - |
      for chart in charts/*/Chart.yaml; do
        dir=$(dirname "$chart")
        name=$(basename "$dir")
        echo "Linting $name..."
        helm lint "$dir" --strict 2>&1 || echo "WARN: $name failed lint (non-blocking)"
      done
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - changes:
        - charts/**/*

# ── Test ──────────────────────────────────────────────────────────────────────

agent-gateway-test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -q uv
    - cd services/agent-gateway && uv sync --frozen 2>/dev/null || uv sync
  script:
    - cd services/agent-gateway && uv run pytest -x --tb=short 2>/dev/null || echo "No tests yet"
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - changes:
        - services/agent-gateway/**/*

# ── Validate ──────────────────────────────────────────────────────────────────

secret-detection:
  stage: validate
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
  script:
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json --no-banner -v
  artifacts:
    paths: [gitleaks-report.json]
    when: always
    expire_in: 30 days
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

dockerfile-lint:
  stage: validate
  image:
    name: hadolint/hadolint:latest-debian
    entrypoint: [""]
  script:
    - |
      find . -name Dockerfile -not -path './.git/*' | while read f; do
        echo "Linting $f..."
        hadolint --ignore DL3013 --ignore DL3016 --ignore DL3042 --ignore DL3008 "$f" || true
      done
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Eval ──────────────────────────────────────────────────────────────────────

agent-eval:
  stage: eval
  image: python:3.12-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl > /dev/null
  script:
    - |
      GATEWAY_URL="${AGENT_GATEWAY_URL:-http://agent-gateway.genai.127.0.0.1.nip.io}"
      echo "Running eval against $GATEWAY_URL"
      curl -sf "$GATEWAY_URL/factory/health" || { echo "Gateway unreachable — skipping"; exit 0; }
      echo "=== Factory Health ==="
      curl -sf "$GATEWAY_URL/factory/health" | python3 -m json.tool
      echo "=== Regression Check ==="
      curl -sf "$GATEWAY_URL/factory/regression" | python3 -m json.tool
      echo "=== Skill Gaps ==="
      curl -sf "$GATEWAY_URL/factory/gaps" | python3 -m json.tool
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - changes:
        - services/agent-gateway/**/*
        - agents/**/*
        - skills/**/*
