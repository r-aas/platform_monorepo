  - package-ecosystem: docker
    directory: /images/mcp-plane
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /images/mcp-claude-code
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /images/mcp-gitlab
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /images/mcp-n8n-knowledge
    schedule:
      interval: weekly

  - package-ecosystem: docker
