# ArgoCD repository credential for local GitLab
#
# Usage: Update the password field with a GitLab PAT, then:
#   kubectl apply -f manifests/argocd-repo-secret.yaml
#
# Or use task argocd:setup which handles this automatically.
apiVersion: v1
kind: Secret
metadata:
  name: argocd-repo-gitlab
  namespace: platform
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: http://gitlab-ce.platform.svc.cluster.local
  username: root
  password: REPLACE_WITH_GITLAB_PAT
  insecure: "true"
