# GitLab ingestion recipe for DataHub
# Ingests repos, merge requests, and issues as DataHub entities
# Note: DataHub's native gitlab source requires the datahub[gitlab] extra
source:
  type: git
  config:
    repo: "http://gitlab.mewtwo.127.0.0.1.nip.io/root/platform_monorepo.git"
    deploy_key: ""  # Not needed for public repos; set if private
    branch: "main"

sink:
  type: datahub-rest
  config:
    server: "http://genai-datahub-datahub-gms.genai.svc.cluster.local:8080"
    token: "${DATAHUB_GMS_TOKEN}"
