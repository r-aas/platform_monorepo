source:
  type: obsidian
  config:
    vault_path: "/vault"
    platform: "obsidian"
    env: "PROD"
    exclude_patterns:
      - "_templates/*"
      - "_attachments/*"

sink:
  type: datahub-rest
  config:
    server: "http://genai-datahub-datahub-gms.genai.svc.cluster.local:8080"
    token: "${DATAHUB_GMS_TOKEN}"
