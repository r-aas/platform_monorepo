apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: APP_NAME
spec:
  ingressClassName: nginx
  rules:
    - host: APP_NAME.dev.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: APP_NAME
                port:
                  number: 80
