# K8s manifests for APP_NAME
# Replace APP_NAME with your project name: bash scripts/init-k8s.sh
# Or manually: sed -i '' 's/APP_NAME/myproject/g' k8s/deployment.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: APP_NAME
  namespace: dev
  labels:
    app: APP_NAME
spec:
  replicas: 1
  selector:
    matchLabels:
      app: APP_NAME
  template:
    metadata:
      labels:
        app: APP_NAME
    spec:
      containers:
        - name: app
          image: registry.mewtwo.127.0.0.1.nip.io/root/APP_NAME:latest
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_BASE_URL
              value: "http://host.docker.internal:11434/v1"
            - name: OPENAI_API_KEY
              value: "ollama"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: APP_NAME
  namespace: dev
  labels:
    app: APP_NAME
spec:
  selector:
    app: APP_NAME
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: APP_NAME
  namespace: dev
spec:
  ingressClassName: nginx
  rules:
    - host: APP_NAME.dev.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: APP_NAME
                port:
                  number: 80
