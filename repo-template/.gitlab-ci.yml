# DevSecOps CI/CD Pipeline — 8 stages, FOSS tools only (GitLab CE compatible)
#
# test → security → build → scan → deploy-dev → deploy-stage → deploy-prod → smoke
#
# Dev deploys automatically on default branch.
# Stage and prod require manual approval (click ▶ in GitLab UI).
# Smoke tests auto-run for each deployed environment.
#
# Security stages use allow_failure: true (advisory).
# Flip to false to enforce gating once codebase is clean.

stages:
  - test
  - security
  - build
  - scan
  - deploy-dev
  - deploy-stage
  - deploy-prod
  - smoke

variables:
  REGISTRY: registry.platform.127.0.0.1.nip.io
  IMAGE: $REGISTRY/$CI_PROJECT_PATH

# ── Stage 1: TEST ─────────────────────────────────────────────

lint:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install uv
    - uv sync --frozen
  script:
    - uv run ruff check .
    - uv run ruff format --check .
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

unit-tests:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install uv
    - uv sync --frozen
  script:
    - uv run pytest --junitxml=junit.xml
  artifacts:
    reports:
      junit: junit.xml
    expire_in: 30 days
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Stage 2: SECURITY ─────────────────────────────────────────

sast-bandit:
  stage: security
  image: python:3.12-slim
  before_script:
    - pip install bandit
  script:
    - bandit -r src/ -f json -o bandit-report.json || true
    - bandit -r src/ -f screen
  artifacts:
    paths: [bandit-report.json]
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

dependency-scan:
  stage: security
  image: python:3.12-slim
  before_script:
    - pip install uv pip-audit
  script:
    - uv export --no-hashes --frozen > requirements.txt
    - pip-audit -r requirements.txt --format=json --output=pip-audit-report.json || true
    - pip-audit -r requirements.txt
  artifacts:
    paths: [pip-audit-report.json]
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

secret-detection:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
  script:
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json --no-banner -v
  artifacts:
    paths: [gitleaks-report.json]
    when: always
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Stage 3: BUILD ─────────────────────────────────────────────

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - >-
      /kaniko/executor
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/Dockerfile
      --destination $IMAGE:$CI_COMMIT_SHORT_SHA
      --destination $IMAGE:latest
      --insecure
      --skip-tls-verify
      --insecure-registry=$REGISTRY
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Stage 4: SCAN (container image) ───────────────────────────

container-scan:
  stage: scan
  image:
    # SECURITY: Pin to exact version. Trivy was compromised in March 2026 supply chain attack.
    # See: https://github.com/BerriAI/litellm/issues/24518
    name: aquasec/trivy:0.62.1
    entrypoint: [""]
  script:
    - >-
      trivy image
      --severity HIGH,CRITICAL
      --format json
      --output trivy-report.json
      --insecure
      $IMAGE:$CI_COMMIT_SHORT_SHA
    - >-
      trivy image
      --severity HIGH,CRITICAL
      --insecure
      $IMAGE:$CI_COMMIT_SHORT_SHA
  artifacts:
    paths: [trivy-report.json]
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Stage 5: DEPLOY DEV (automatic) ──────────────────────────

deploy-dev:
  stage: deploy-dev
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  script:
    - kubectl --insecure-skip-tls-verify apply -k k8s/overlays/dev/
    - kubectl --insecure-skip-tls-verify set image -n dev deployment/$CI_PROJECT_NAME app=$IMAGE:$CI_COMMIT_SHORT_SHA
    - kubectl --insecure-skip-tls-verify rollout status -n dev deployment/$CI_PROJECT_NAME --timeout=120s
  environment:
    name: dev
    url: http://$CI_PROJECT_NAME.platform.127.0.0.1.nip.io
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Stage 6: DEPLOY STAGE (manual gate) ──────────────────────

deploy-stage:
  stage: deploy-stage
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  script:
    - kubectl --insecure-skip-tls-verify apply -k k8s/overlays/stage/
    - kubectl --insecure-skip-tls-verify set image -n stage deployment/$CI_PROJECT_NAME app=$IMAGE:$CI_COMMIT_SHORT_SHA
    - kubectl --insecure-skip-tls-verify rollout status -n stage deployment/$CI_PROJECT_NAME --timeout=120s
  environment:
    name: stage
    url: http://$CI_PROJECT_NAME.platform.127.0.0.1.nip.io
  when: manual
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Stage 7: DEPLOY PROD (manual gate, requires stage first) ─

deploy-prod:
  stage: deploy-prod
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  script:
    - kubectl --insecure-skip-tls-verify apply -k k8s/overlays/prod/
    - kubectl --insecure-skip-tls-verify set image -n prod deployment/$CI_PROJECT_NAME app=$IMAGE:$CI_COMMIT_SHORT_SHA
    - kubectl --insecure-skip-tls-verify rollout status -n prod deployment/$CI_PROJECT_NAME --timeout=120s
  environment:
    name: prod
    url: http://$CI_PROJECT_NAME.platform.127.0.0.1.nip.io
  needs: [deploy-stage]
  when: manual
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Stage 8: SMOKE TESTS ─────────────────────────────────────

.smoke-template: &smoke-template
  stage: smoke
  image: curlimages/curl:latest
  script:
    - sleep 10
    - |
      URL="http://host.docker.internal"
      HOSTOPT="-H Host:${APP_HOST}"
      echo "--- Health check (${DEPLOY_ENV}) ---"
      curl -sf $HOSTOPT "$URL/health" || exit 1
      echo ""
      echo "Smoke test passed (${DEPLOY_ENV})"

smoke-dev:
  <<: *smoke-template
  variables:
    APP_HOST: $CI_PROJECT_NAME.platform.127.0.0.1.nip.io
    DEPLOY_ENV: dev
  needs: [deploy-dev]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

smoke-stage:
  <<: *smoke-template
  variables:
    APP_HOST: $CI_PROJECT_NAME.platform.127.0.0.1.nip.io
    DEPLOY_ENV: stage
  needs: [deploy-stage]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success

smoke-prod:
  <<: *smoke-template
  variables:
    APP_HOST: $CI_PROJECT_NAME.platform.127.0.0.1.nip.io
    DEPLOY_ENV: prod
  needs: [deploy-prod]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
