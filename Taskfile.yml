version: "3"

dotenv:
  - ~/work/envs/global.env

vars:
  K3D_CLUSTER: mewtwo
  K3D_CONFIG: "${HOME}/work/k3d-mewtwo.yaml"
  PLATFORM_DIR: "${HOME}/work/repos/platform_monorepo"
  PLATFORM_ARCH: '{{.PLATFORM_ARCH | default "arm64"}}'

includes:
  k3d: ~/work/taskfiles/k3d.yml
  factory: ~/work/taskfiles/factory.yml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ── Lifecycle ───────────────────────────────────────────────

  up:
    desc: "Full platform bootstrap: preflight → colima → k3d → helmfile → GitLab → images → ArgoCD → n8n → agents → smoke"
    cmds:
      - task: preflight
      - task: ensure-colima
      - task: k3d:cluster-up
      - task: sync-if-needed
      - task: gitlab-setup
      - task: build-images
      - echo ""
      - echo "▸ Waiting for ArgoCD to sync all workloads..."
      - bash {{.PLATFORM_DIR}}/scripts/wait-healthy.sh 600
      - echo ""
      - task: n8n-import
      - task: agent-sync
      - echo ""
      - task: smoke
      - echo ""
      - task: urls

  down:
    desc: "Tear down everything (helmfile destroy + cluster delete)"
    prompt: "Destroy cluster k3d-{{.K3D_CLUSTER}} and all releases? PV data preserved."
    cmds:
      - cd {{.PLATFORM_DIR}} && helmfile destroy || true
      - task: k3d:cluster-down
      - echo ""
      - echo "Platform is down. PV data preserved at ~/work/data/k3d/{{.K3D_CLUSTER}}/"

  stop:
    desc: "Pause cluster (preserves state, frees resources)"
    cmds:
      - task: k3d:cluster-stop

  start:
    desc: "Resume paused or crashed cluster: ensure colima → images → sync → smoke"
    cmds:
      - task: ensure-colima
      - task: k3d:cluster-start
      - task: build-images
      - task: sync-if-needed
      - bash {{.PLATFORM_DIR}}/scripts/wait-healthy.sh 300
      - echo ""
      - echo "Platform resumed."
      - task: urls

  restart:
    desc: "Full restart: stop → start (handles Colima crash, image loss, stale state)"
    cmds:
      - task: stop
      - task: start

  ensure-colima:
    desc: "Ensure Colima VM is running and Docker socket is available"
    cmds:
      - bash {{.PLATFORM_DIR}}/scripts/ensure-colima.sh

  # ── Pre-flight & verification ──────────────────────────────

  preflight:
    desc: "Check all external dependencies before bootstrap"
    cmds:
      - bash {{.PLATFORM_DIR}}/scripts/preflight.sh

  smoke:
    desc: "Verify all platform services are reachable"
    cmds:
      - bash {{.PLATFORM_DIR}}/scripts/smoke.sh

  build-images:
    desc: "Build custom Docker images and import into k3d"
    env:
      K3D_CLUSTER: "{{.K3D_CLUSTER}}"
    cmds:
      - bash {{.PLATFORM_DIR}}/scripts/build-images.sh

  # ── Helmfile ────────────────────────────────────────────────

  sync-if-needed:
    desc: "Helmfile sync only if ArgoCD not yet managing (first bootstrap)"
    internal: true
    dir: "{{.PLATFORM_DIR}}"
    env:
      PLATFORM_ARCH: "{{.PLATFORM_ARCH}}"
    cmds:
      - |
        if kubectl get deploy argocd-server -n platform 2>/dev/null | grep -q "argocd-server"; then
          echo "▸ ArgoCD already deployed — skipping helmfile sync (ArgoCD manages day-2)"
        else
          helmfile sync
        fi

  sync:
    desc: "Helmfile sync — bootstrap/reconcile cluster infrastructure"
    dir: "{{.PLATFORM_DIR}}"
    env:
      PLATFORM_ARCH: "{{.PLATFORM_ARCH}}"
    cmds:
      - helmfile sync

  diff:
    desc: "Helmfile diff — preview changes before sync"
    dir: "{{.PLATFORM_DIR}}"
    env:
      PLATFORM_ARCH: "{{.PLATFORM_ARCH}}"
    cmds:
      - helmfile diff

  # ── Status ──────────────────────────────────────────────────

  status:
    desc: Full platform status (cluster, releases, ArgoCD apps, pods)
    cmds:
      - task: k3d:status
      - echo ""
      - echo "── Helm Releases ──────────────────────────"
      - helm list -A --output table 2>/dev/null || echo "None"
      - echo ""
      - echo "── ArgoCD Applications ────────────────────"
      - kubectl get applications -n platform -o wide 2>/dev/null || echo "None"
      - echo ""
      - echo "── Pods ───────────────────────────────────"
      - kubectl get pods -A --sort-by=.metadata.namespace 2>/dev/null

  urls:
    desc: Print all platform URLs and credentials
    cmds:
      - |
        echo ""
        echo "  Platform URLs:"
        echo "  ─────────────────────────────────────────"
        echo "  ArgoCD:       http://argocd.mewtwo.127.0.0.1.nip.io"
        echo "  GitLab:       http://gitlab.mewtwo.127.0.0.1.nip.io"
        echo "  n8n:          http://n8n.mewtwo.127.0.0.1.nip.io"
        echo "  MLflow:       http://mlflow.genai.127.0.0.1.nip.io"
        echo "  LiteLLM:      http://litellm.genai.127.0.0.1.nip.io"
        echo "  MinIO:        http://minio-console.genai.127.0.0.1.nip.io"
        echo ""
        echo "  Credentials:"
        echo "  ─────────────────────────────────────────"
        printf "  GitLab root:  " && task gitlab-password 2>/dev/null
        printf "  ArgoCD admin: " && task argocd-password 2>/dev/null
        echo "  MinIO:        minioadmin / minioadmin"
        echo ""

  # ── GitLab ──────────────────────────────────────────────────

  gitlab-password:
    desc: Get GitLab root initial password
    silent: true
    cmds:
      - |
        kubectl -n platform get secret gitlab-ce-initial-password \
          -o jsonpath='{.data.initial_root_password}' 2>/dev/null | base64 -d && echo "" || \
          echo "(not available)"

  gitlab-setup:
    desc: "Full GitLab bootstrap (PAT, runner, ArgoCD creds, push repo)"
    dir: "{{.PLATFORM_DIR}}"
    cmds:
      - bash scripts/gitlab-bootstrap.sh

  gitlab-wait:
    desc: Wait for GitLab pod to be Ready (first boot ~8 min)
    cmds:
      - kubectl -n platform rollout status statefulset/gitlab-ce --timeout=600s

  gitlab-logs:
    desc: Tail GitLab pod logs
    cmds:
      - kubectl -n platform logs -l app.kubernetes.io/name=gitlab-ce --tail=50 -f

  # ── ArgoCD ──────────────────────────────────────────────────

  argocd-password:
    desc: Get ArgoCD admin password
    silent: true
    cmds:
      - |
        kubectl -n platform get secret argocd-initial-admin-secret \
          -o jsonpath="{.data.password}" 2>/dev/null | base64 -d && echo "" || \
          echo "(not available)"

  argocd-apps:
    desc: Show ArgoCD Application sync status
    cmds:
      - kubectl get applications -n platform -o wide 2>/dev/null || echo "No applications"

  # ── Project scaffolding ─────────────────────────────────────

  project:new:
    desc: "Scaffold a new project from repo-template (usage: task project:new -- myapp)"
    vars:
      PROJECT_NAME: "{{.CLI_ARGS}}"
      REPOS_DIR: "${HOME}/work/repos"
      TEMPLATE_DIR: "{{.PLATFORM_DIR}}/repo-template"
      GITLAB_URL: '{{.GITLAB_URL | default "http://gitlab.mewtwo.127.0.0.1.nip.io"}}'
      GITLAB_PAT: '{{.GITLAB_PAT | default ""}}'
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task project:new -- <project-name>"
      - sh: '[ ! -d "{{.REPOS_DIR}}/{{.PROJECT_NAME}}" ]'
        msg: "Directory {{.REPOS_DIR}}/{{.PROJECT_NAME}} already exists"
    cmds:
      - cp -r {{.TEMPLATE_DIR}} {{.REPOS_DIR}}/{{.PROJECT_NAME}}
      - bash {{.REPOS_DIR}}/{{.PROJECT_NAME}}/scripts/init-k8s.sh {{.PROJECT_NAME}}
      - cd {{.REPOS_DIR}}/{{.PROJECT_NAME}} && git init && git add -A && git commit -m "Initial scaffold from repo-template"
      - echo "Created {{.REPOS_DIR}}/{{.PROJECT_NAME}}"

  # ── n8n post-deploy ─────────────────────────────────────────

  n8n-setup:
    desc: "Create n8n owner account + API key (stored as k8s Secret)"
    cmds:
      - bash {{.PLATFORM_DIR}}/scripts/n8n-setup.sh {{.CLI_ARGS}}

  n8n-import:
    desc: "Import genai-mlops workflows into k3d n8n (patches URLs, skips if genai-mlops absent)"
    deps: [n8n-setup]
    cmds:
      - |
        if [ ! -d "${HOME}/work/repos/genai-mlops/n8n-data/workflows" ]; then
          echo "  ⚠ genai-mlops not found — skipping n8n workflow import"
          echo "    Clone it: git clone <url> ~/work/repos/genai-mlops"
          exit 0
        fi
        bash {{.PLATFORM_DIR}}/scripts/n8n-import-workflows.sh

  agent-sync:
    desc: "Sync agent YAML definitions to MLflow prompt registry (retries until MLflow ready)"
    cmds:
      - |
        MLFLOW_URL="${MLFLOW_TRACKING_URI:-http://mlflow.genai.127.0.0.1.nip.io}"
        echo "  Waiting for MLflow..."
        for i in $(seq 1 20); do
          HTTP=$(curl -sf -o /dev/null -w '%{http_code}' --max-time 3 "${MLFLOW_URL}/health" 2>/dev/null || echo "000")
          [ "$HTTP" = "200" ] && break
          sleep 3
        done
        cd {{.PLATFORM_DIR}}/services/agent-gateway && \
        uv run python -c "
        from pathlib import Path
        from agent_gateway.agentspec.sync import sync_all
        import mlflow, os
        mlflow.set_tracking_uri(os.environ.get('MLFLOW_TRACKING_URI', 'http://mlflow.genai.127.0.0.1.nip.io'))
        synced = sync_all(Path('../../agents'))
        print('  ✓ Synced ' + str(len(synced)) + ' agents: ' + ', '.join(synced))
        "

  n8n-logs:
    desc: Tail n8n pod logs
    cmds:
      - kubectl -n genai logs -l app.kubernetes.io/instance=genai-n8n --tail=50 -f

  # ── Utilities ───────────────────────────────────────────────

  resume:
    desc: Show session resume notes
    cmds:
      - cat {{.PLATFORM_DIR}}/RESUME.md

  metrics:
    desc: "Platform metrics: spec delivery, task burn-down, assets (--smoke for live checks)"
    cmds:
      - bash {{.PLATFORM_DIR}}/scripts/metrics.sh {{.CLI_ARGS}}

  doctor:
    desc: Verify platform health (preflight + smoke)
    cmds:
      - task: preflight
      - echo ""
      - task: smoke
