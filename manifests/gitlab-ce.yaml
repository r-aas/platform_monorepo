apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-config
  namespace: platform
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-data
  namespace: platform
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-logs
  namespace: platform
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-config
  namespace: platform
data:
  GITLAB_OMNIBUS_CONFIG: |
    external_url 'http://gitlab.mewtwo.127.0.0.1.nip.io'
    nginx['listen_port'] = 80
    nginx['listen_https'] = false

    # Registry
    registry_external_url 'http://registry.mewtwo.127.0.0.1.nip.io'
    registry_nginx['listen_port'] = 80
    registry_nginx['listen_https'] = false
    registry['enable'] = true

    # Performance tuning for local dev
    puma['workers'] = 2
    sidekiq['concurrency'] = 5
    postgresql['shared_buffers'] = '256MB'
    prometheus_monitoring['enable'] = false
    grafana['enable'] = false

    # GitLab Runner registration token (set after first boot)
    # gitlab_rails['initial_root_password'] = 'changeme123'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: platform
  labels:
    app: gitlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:latest
          envFrom:
            - configMapRef:
                name: gitlab-config
          ports:
            - containerPort: 80
              name: http
            - containerPort: 22
              name: ssh
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "4"
          volumeMounts:
            - name: config
              mountPath: /etc/gitlab
            - name: data
              mountPath: /var/opt/gitlab
            - name: logs
              mountPath: /var/log/gitlab
          readinessProbe:
            httpGet:
              path: /-/readiness
              port: 80
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/liveness
              port: 80
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: gitlab-config
        - name: data
          persistentVolumeClaim:
            claimName: gitlab-data
        - name: logs
          persistentVolumeClaim:
            claimName: gitlab-logs
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab
  namespace: platform
spec:
  selector:
    app: gitlab
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: ssh
      port: 22
      targetPort: 22
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab
  namespace: platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "900"
spec:
  ingressClassName: nginx
  rules:
    - host: gitlab.mewtwo.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab
                port:
                  number: 80
    - host: registry.mewtwo.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab
                port:
                  number: 80
