# ArgoCD Applications — GenAI stack (infra + apps)
#
# These manage the same Helm releases as `task genai-helm:deploy`.
# Sync policy is manual — no auto-sync for local dev.
#
# Prerequisites:
#   1. ArgoCD deployed (task argocd:deploy)
#   2. GitLab CE running with platform_monorepo pushed
#   3. Repo secret applied (task argocd:setup)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: genai-infra
  namespace: platform
spec:
  project: genai
  source:
    repoURL: http://gitlab-ce.platform.svc.cluster.local/root/platform_monorepo.git
    targetRevision: HEAD
    path: charts/genai-infra
    helm:
      valueFiles:
        - values.yaml
        - values-k3d.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: genai
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: genai-apps
  namespace: platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: genai
  source:
    repoURL: http://gitlab-ce.platform.svc.cluster.local/root/platform_monorepo.git
    targetRevision: HEAD
    path: charts/genai-apps
    helm:
      valueFiles:
        - values.yaml
        - values-k3d.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: genai
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
