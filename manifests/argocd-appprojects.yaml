# ArgoCD AppProjects — isolate genai and platform workloads
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: genai
  namespace: platform
spec:
  description: GenAI MLOps platform applications
  sourceRepos:
    - '*'  # Allow any repo (local GitLab URLs vary)
  destinations:
    - namespace: genai
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-apps
  namespace: platform
spec:
  description: Platform infrastructure (GitLab, ArgoCD)
  sourceRepos:
    - '*'
  destinations:
    - namespace: platform
      server: https://kubernetes.default.svc
    - namespace: dev
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
