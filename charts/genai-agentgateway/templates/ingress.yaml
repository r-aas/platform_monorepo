# ═══════════════════════════════════════════════════════
# Ingress — MCP proxy under gateway.platform.127.0.0.1.nip.io/mcp
# Shares host with agent-gateway; /mcp/* routes to agentgateway proxy.
# ═══════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agentgateway.fullname" .Subcharts.agentgateway }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: genai-agentgateway
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
  - host: gateway.platform.127.0.0.1.nip.io
    http:
      paths:
      - path: /mcp
        pathType: Prefix
        backend:
          service:
            name: {{ include "agentgateway.fullname" .Subcharts.agentgateway }}-mcp
            port:
              number: 8080
