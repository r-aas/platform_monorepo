# Auto-discovered git-path workloads from charts/ directory.
#
# Convention:
#   charts/genai-*  → namespace: genai,    project: genai,         syncWave: infra(0) or app(1)
#   charts/gitlab-* → namespace: platform, project: platform-apps, syncWave: 0 or 1
#
# Excluded (helmfile-managed):
#   argocd, argocd-root, ingress-nginx, namespace-init
#
# SyncWave convention:
#   Database/storage charts (pg-*, minio, pgvector) → wave 0
#   Application charts → wave 1
#
# To add a new chart: just create charts/<name>/ with Chart.yaml + values.yaml.
# ArgoCD discovers it automatically on next git sync (~3 min).

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads-git
  namespace: {{ .Release.Namespace }}
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: {{ .Values.gitlabRepoUrl }}
        revision: {{ .Values.targetRevision }}
        directories:
          - path: charts/*
          # Exclude helmfile-managed bootstrap charts
          - path: charts/argocd
            exclude: true
          - path: charts/argocd-root
            exclude: true
          - path: charts/ingress-nginx
            exclude: true
          - path: charts/namespace-init
            exclude: true
          # Values-only dirs for helmWorkloads (external Helm repos)
          - path: charts/genai-plane
            exclude: true
  template:
    metadata:
      name: '{{`{{ .path.basename }}`}}'
      namespace: {{ .Release.Namespace }}
      annotations:
        # Databases/storage (pg-*, minio, pgvector) sync first, apps after
        argocd.argoproj.io/sync-wave: |-
          {{`{{ if or (hasPrefix "genai-pg" .path.basename) (eq .path.basename "genai-minio") (eq .path.basename "genai-pgvector") }}0{{ else }}1{{ end }}`}}
    spec:
      project: |-
        {{`{{ if hasPrefix "genai-" .path.basename }}genai{{ else if or (hasPrefix "gitlab-" .path.basename) (eq .path.basename "argocd") }}platform-apps{{ else }}genai{{ end }}`}}
      source:
        repoURL: {{ .Values.gitlabRepoUrl }}
        targetRevision: {{ .Values.targetRevision }}
        path: '{{`{{ .path.path }}`}}'
        helm:
          valueFiles:
            - values.yaml
            - values-k3d.yaml
          ignoreMissingValueFiles: true
      destination:
        server: https://kubernetes.default.svc
        namespace: |-
          {{`{{ if hasPrefix "genai-" .path.basename }}genai{{ else if or (hasPrefix "gitlab-" .path.basename) (eq .path.basename "argocd") }}platform{{ else }}genai{{ end }}`}}
      ignoreDifferences:
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates
        - group: batch
          kind: Job
          jqPathExpressions:
            - .spec.selector
            - .spec.template.metadata
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
