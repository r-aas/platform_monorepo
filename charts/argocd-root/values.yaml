# ArgoCD root configuration
# Controls which workloads ArgoCD manages after bootstrap.
#
# Lifecycle:
#   1. helmfile seeds: ingress-nginx, namespaces, gitlab-ce, argocd, argocd-root
#   2. Push platform_monorepo to in-cluster GitLab
#   3. Configure ArgoCD repo credentials (task argocd-setup-repo -- <PAT>)
#   4. ArgoCD auto-discovers all charts/ directories and syncs them
#
# Auto-discovery:
#   Any chart in charts/<name>/ with a Chart.yaml is auto-deployed.
#   Namespace/project derived from name prefix:
#     genai-*   → genai namespace, genai project
#     gitlab-*  → platform namespace, platform-apps project
#   Excluded (helmfile-managed): argocd, argocd-root, ingress-nginx, namespace-init

# GitLab in-cluster service (deployed by helmfile bootstrap)
gitlabRepoUrl: http://gitlab-ce.platform.svc.cluster.local/root/platform_monorepo.git
targetRevision: HEAD

# ── Helm-repo workloads ──
# ArgoCD self-management only. All other charts are git-path auto-discovered.
helmWorkloads:
  - appName: argocd
    project: platform-apps
    repoUrl: https://argoproj.github.io/argo-helm
    chart: argo-cd
    chartVersion: "9.4.10"
    valuesPath: charts/argocd
    namespace: platform
    syncWave: "0"

  - appName: genai-plane
    project: genai
    repoUrl: https://helm.plane.so/
    chart: plane-ce
    chartVersion: "1.4.1"
    valuesPath: charts/genai-plane
    namespace: genai
    syncWave: "1"

# ── kagent promotion environments ──
# Deploys the same genai-kagent chart to dev/stage namespaces.
# Agents in these namespaces reference MCP servers in genai (cross-namespace).
kagentEnvironments:
  - name: genai-dev
    namespace: genai-dev
    targetRevision: HEAD
    syncPolicy: automated
  - name: genai-stage
    namespace: genai-stage
    targetRevision: HEAD
    syncPolicy: automated

