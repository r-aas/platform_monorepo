# ArgoCD root configuration
# Controls which workloads ArgoCD manages after bootstrap.
#
# Lifecycle:
#   1. helmfile seeds: ingress-nginx, namespaces, gitlab-ce, argocd, argocd-root
#   2. Push platform_monorepo to in-cluster GitLab
#   3. Configure ArgoCD repo credentials (task argocd-setup-repo -- <PAT>)
#   4. ArgoCD syncs all workloads below, including self-upgrades

# GitLab in-cluster service (deployed by helmfile bootstrap)
gitlabRepoUrl: http://gitlab-ce.platform.svc.cluster.local/root/platform_monorepo.git
targetRevision: HEAD

# ── Git-path workloads ──
# Each chart is a thin wrapper with its own Chart.yaml + values.
# One service per chart — independent sync, independent health.
gitWorkloads:
  # -- Platform tier --
  - appName: gitlab-ce
    project: platform-apps
    path: charts/gitlab-ce
    namespace: platform
    syncWave: "0"

  - appName: gitlab-runner
    project: platform-apps
    path: charts/gitlab-runner
    namespace: platform
    syncWave: "1"

  # -- GenAI infrastructure (syncWave 0 — databases first) --
  - appName: genai-minio
    project: genai
    path: charts/genai-minio
    namespace: genai
    syncWave: "0"

  - appName: genai-pg-n8n
    project: genai
    path: charts/genai-pg-n8n
    namespace: genai
    syncWave: "0"

  - appName: genai-pg-mlflow
    project: genai
    path: charts/genai-pg-mlflow
    namespace: genai
    syncWave: "0"

  - appName: genai-pg-langfuse
    project: genai
    path: charts/genai-pg-langfuse
    namespace: genai
    syncWave: "0"

  - appName: genai-pgvector
    project: genai
    path: charts/genai-pgvector
    namespace: genai
    syncWave: "0"

  - appName: genai-neo4j
    project: genai
    path: charts/genai-neo4j
    namespace: genai
    syncWave: "0"

  # -- GenAI applications (syncWave 1 — after databases) --
  - appName: genai-n8n
    project: genai
    path: charts/genai-n8n
    namespace: genai
    syncWave: "1"

  - appName: genai-mlflow
    project: genai
    path: charts/genai-mlflow
    namespace: genai
    syncWave: "1"

  - appName: genai-langfuse
    project: genai
    path: charts/genai-langfuse
    namespace: genai
    syncWave: "1"

  - appName: genai-litellm
    project: genai
    path: charts/litellm
    namespace: genai
    syncWave: "1"

  - appName: genai-streaming-proxy
    project: genai
    path: charts/streaming-proxy
    namespace: genai
    syncWave: "1"

  - appName: genai-airflow
    project: genai
    path: charts/genai-airflow
    namespace: genai
    syncWave: "1"


# ── Helm-repo workloads ──
# ArgoCD self-management only. All other charts are git-path wrappers.
helmWorkloads:
  - appName: argocd
    project: platform-apps
    repoUrl: https://argoproj.github.io/argo-helm
    chart: argo-cd
    chartVersion: "9.4.10"
    valuesPath: charts/argocd
    namespace: platform
    syncWave: "0"

