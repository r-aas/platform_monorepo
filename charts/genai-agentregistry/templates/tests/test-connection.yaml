apiVersion: v1
kind: Pod
metadata:
  name: {{ include "agentregistry.fullname" . }}-test-connection
  labels:
    {{- include "agentregistry.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - wget
        - --spider
        - --timeout=5
        - http://{{ include "agentregistry.fullname" . }}:{{ .Values.service.ports.http }}/docs
