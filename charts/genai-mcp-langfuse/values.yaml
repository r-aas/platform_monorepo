replicaCount: 1

image:
  repository: mcp-langfuse
  tag: "latest"
  pullPolicy: IfNotPresent

server:
  port: 3000

langfuse:
  baseUrl: "http://genai-langfuse-web.genai.svc.cluster.local:3000"
  existingSecret: "langfuse-api-keys"
  publicKeyKey: "public-key"
  secretKeyKey: "secret-key"

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: "0.5"

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 20
  periodSeconds: 30
  failureThreshold: 5
