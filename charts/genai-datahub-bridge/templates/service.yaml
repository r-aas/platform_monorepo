apiVersion: v1
kind: Service
metadata:
  name: genai-datahub-bridge
  labels:
    app.kubernetes.io/name: datahub-bridge
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    app.kubernetes.io/name: datahub-bridge
