image:
  repository: datahub-bridge
  tag: latest
  pullPolicy: Never

replicas: 1

service:
  port: 8000

env:
  DATAHUB_GMS_URL: "http://datahub-datahub-gms.genai.svc.cluster.local:8080"
  DATAHUB_TOKEN: ""

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: "0.5"
