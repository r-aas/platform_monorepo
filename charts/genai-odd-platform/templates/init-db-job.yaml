apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "genai-odd-platform.fullname" . }}-init-db
  labels:
    {{- include "genai-odd-platform.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      labels:
        {{- include "genai-odd-platform.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              PGPASSWORD="$PGPASSWORD" psql -h genai-pgvector.genai.svc.cluster.local -U postgres -tc \
                "SELECT 1 FROM pg_database WHERE datname = 'odd_platform'" | grep -q 1 \
                || PGPASSWORD="$PGPASSWORD" psql -h genai-pgvector.genai.svc.cluster.local -U postgres -c \
                "CREATE DATABASE odd_platform"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: password
