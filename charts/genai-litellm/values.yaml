replicaCount: 1

image:
  # litellm-mlflow: local image — built FROM litellm-database + mlflow (see images/litellm/Dockerfile)
  # Must be imported into k3d: task litellm:build && k3d image import litellm-mlflow:latest -c mewtwo
  # litellm-database provides Prisma — required for MCP registry, virtual keys, A2A
  repository: litellm-mlflow
  tag: "latest"
  pullPolicy: Never

service:
  type: ClusterIP
  port: 4000

# ---------------------------------------------------------------------------
# Master key — authenticates all API calls to the proxy
# ---------------------------------------------------------------------------
# Set to a real value in values-k3d.yaml or pass --set masterkey=sk-...
# If left empty, master key auth is disabled (unsafe for production).
masterkey: ""
# To use a pre-existing secret instead:
# masterkeySecretName: "litellm-secrets"
# masterkeySecretKey: "master-key"
masterkeySecretName: ""
masterkeySecretKey: "master-key"

# ---------------------------------------------------------------------------
# Langfuse — observability keys from k8s secret
# Create secret: kubectl create secret generic langfuse-api-keys -n genai \
#   --from-literal=public-key=pk-lf-... --from-literal=secret-key=sk-lf-...
# ---------------------------------------------------------------------------
langfuse:
  existingSecret: "langfuse-api-keys"
  publicKeyKey: "public-key"
  secretKeyKey: "secret-key"

# ---------------------------------------------------------------------------
# Database — required for MCP gateway registry, virtual keys, A2A agents
# ---------------------------------------------------------------------------
db:
  # Reuse genai-pgvector (already running, litellm DB created manually)
  useExisting: true
  endpoint: genai-pgvector
  database: litellm
  url: "postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)"
  secret:
    name: genai-pgvector
    usernameKey: username        # key holding the db user (set below if needed)
    passwordKey: password        # "pgvector" user password
  # pgvector secret only has "password" and "postgres-password" keys.
  # username is hardcoded below via envVars.
  deployStandalone: false

# ---------------------------------------------------------------------------
# Prisma migration job — runs schema migrations before LiteLLM starts
# ---------------------------------------------------------------------------
migrationJob:
  enabled: true
  retries: 3
  backoffLimit: 4
  ttlSecondsAfterFinished: 120
  resources: {}
  hooks:
    argocd:
      enabled: true   # PreSync hook for ArgoCD GitOps
    helm:
      enabled: false

# ---------------------------------------------------------------------------
# LiteLLM proxy configuration (rendered as /app/config.yaml)
# ---------------------------------------------------------------------------
config:
  model_list:
    - model_name: "qwen2.5:14b"
      litellm_params:
        model: "openai/qwen2.5:14b"
        api_base: "http://192.168.5.2:11434/v1"
        api_key: "ollama"
    - model_name: "qwen2.5:7b"
      litellm_params:
        model: "openai/qwen2.5:7b"
        api_base: "http://192.168.5.2:11434/v1"
        api_key: "ollama"
    - model_name: "glm-4.7-flash"
      litellm_params:
        model: "openai/glm-4.7-flash"
        api_base: "http://192.168.5.2:11434/v1"
        api_key: "ollama"
    - model_name: "qwen3:32b"
      litellm_params:
        model: "openai/qwen3:32b"
        api_base: "http://192.168.5.2:11434/v1"
        api_key: "ollama"
    - model_name: "mistral:7b-instruct"
      litellm_params:
        model: "openai/mistral:7b-instruct"
        api_base: "http://192.168.5.2:11434/v1"
        api_key: "ollama"
    - model_name: "gemma3:12b"
      litellm_params:
        model: "openai/gemma3:12b"
        api_base: "http://192.168.5.2:11434/v1"
        api_key: "ollama"
    - model_name: "nomic-embed-text"
      litellm_params:
        model: "openai/nomic-embed-text"
        api_base: "http://192.168.5.2:11434/v1"
        api_key: "ollama"
    - model_name: "glm-4.7-flash"
      litellm_params:
        model: "openai/glm-4.7-flash"
        api_base: "http://192.168.5.2:11434/v1"
        api_key: "ollama"
    # Alias: allow agents that hardcode gpt-4o to work via Ollama
    - model_name: "gpt-4o"
      litellm_params:
        model: "openai/glm-4.7-flash"
        api_base: "http://192.168.5.2:11434/v1"
        api_key: "ollama"

  # ---------------------------------------------------------------------------
  # MCP Gateway — LiteLLM proxies MCP tool calls to these servers
  # Agents and workflows call /v1/chat/completions or /v1/responses and
  # LiteLLM handles tool routing automatically.
  # ---------------------------------------------------------------------------
  mcp_servers:
    # MCP server names MUST use underscores — hyphens not allowed by LiteLLM
    # Kubernetes operations — kubectl get/describe/logs/apply
    kubernetes_ops:
      transport: "http"
      url: "http://genai-mcp-kubernetes:3000/mcp"
      description: "Kubernetes cluster management via kubectl"

    # n8n workflow operations — list/trigger/manage workflows
    n8n_workflow_ops:
      transport: "http"
      url: "http://genai-mcp-n8n:3000/mcp"
      description: "n8n workflow management and execution"

    # GitLab operations — browse/manage repos, MRs, pipelines
    # Note: currently has nil-schema bug on create_or_update_file — track upstream
    gitlab_ops:
      transport: "http"
      url: "http://genai-mcp-gitlab:3000/mcp"
      description: "GitLab repository, MR, and pipeline management"

    # DataHub metadata catalog — search datasets, pipelines, lineage
    datahub_metadata:
      transport: "http"
      url: "http://genai-mcp-datahub.genai.svc.cluster.local:3000/mcp"
      description: "DataHub metadata catalog — search datasets, pipelines, lineage"

    # Agent gateway — expose agent-gateway REST API as MCP tools
    # (served by the gateway MCP server at /gateway-mcp)
    agent_gateway:
      transport: "http"
      url: "http://genai-agent-gateway:8000/gateway-mcp"
      description: "Agent gateway management — list/invoke agents and skills"

    # Open Ontologies — OWL2/SHACL ontology engine with SPARQL
    open_ontologies:
      transport: "http"
      url: "http://genai-open-ontologies:8080/mcp"
      description: "Ontology engine — OWL2 reasoning, SHACL validation, SPARQL queries"

  general_settings:
    master_key: "os.environ/LITELLM_MASTER_KEY"
    store_model_in_db: true       # enables DB-backed model/MCP registry (requires DB)
    database_url: "os.environ/DATABASE_URL"

  litellm_settings:
    drop_params: true
    num_retries: 2
    request_timeout: 300
    # success_callback: ["mlflow"]  # Disabled — adds ~16s latency per call.
    success_callback: ["langfuse"]  # Async batching — minimal overhead

# ---------------------------------------------------------------------------
# Environment variables
# ---------------------------------------------------------------------------
env:
  MLFLOW_TRACKING_URI: "http://genai-mlflow.genai.svc.cluster.local"
  MLFLOW_EXPERIMENT_NAME: "litellm-traces"
  # Langfuse observability — host only; keys come from langfuse.existingSecret
  LANGFUSE_HOST: "http://genai-langfuse-web.genai.svc.cluster.local:3000"
  # Database credentials — username is pgvector, password from secret
  DATABASE_USERNAME: "pgvector"
  DATABASE_HOST: "genai-pgvector"
  DATABASE_NAME: "litellm"

# Secrets whose keys become env vars (each item is a secret name)
# environmentSecrets:
#   - litellm-secrets   # must contain LITELLM_MASTER_KEY, DATABASE_PASSWORD

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 2Gi
    cpu: "2.0"

ingress:
  enabled: true
  className: nginx
  host: litellm.platform.127.0.0.1.nip.io
  annotations: {}

livenessProbe:
  httpGet:
    path: /health/liveliness
    port: 4000
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 30

readinessProbe:
  httpGet:
    path: /health/readiness
    port: 4000
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 10

startupProbe:
  httpGet:
    path: /health/readiness
    port: 4000
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 30
