{{- if and (not .Values.masterkeySecretName) (not .Values.masterkey) }}
{{- $masterkey := printf "sk-%s" (randAlphaNum 24) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-masterkey
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: genai-mlops
  annotations:
    # Auto-generated on first install. Won't rotate on upgrades (secret persists).
    helm.sh/resource-policy: keep
type: Opaque
data:
  masterkey: {{ $masterkey | b64enc }}
{{- end }}
