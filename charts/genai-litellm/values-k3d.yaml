# LiteLLM k3d overrides
# Secrets and machine-specific values go here (gitignored? No — master key is fine for local dev)

# Master key for local k3d — change for staging/prod
masterkey: "sk-litellm-mewtwo-local"

env:
  MLFLOW_TRACKING_URI: "http://genai-mlflow.genai.svc.cluster.local"
  MLFLOW_EXPERIMENT_NAME: "litellm-traces"
  DATABASE_USERNAME: "pgvector"
  DATABASE_HOST: "genai-pgvector"
  DATABASE_NAME: "litellm"
  # pgvector user password — matches genai-pgvector secret key "password"
  DATABASE_PASSWORD: "pgvector"
  DATABASE_URL: "postgresql://pgvector:pgvector@genai-pgvector/litellm"
  # LITELLM_MASTER_KEY injected by deployment template from .Values.masterkey
  LITELLM_SALT_KEY: "litellm-salt-mewtwo-local"
