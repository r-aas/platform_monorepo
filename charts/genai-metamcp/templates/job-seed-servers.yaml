{{- if .Values.seedServers.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-seed-servers
  labels:
    app.kubernetes.io/name: metamcp
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: genai-mlops
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  servers.json: {{ .Values.seedServers.servers | toJson | quote }}
  mappings.json: {{ .Values.seedServers.namespaceMappings | toJson | quote }}
  namespaces.json: {{ .Values.seedServers.namespaces | default list | toJson | quote }}
  endpoints.json: {{ .Values.seedServers.endpoints | default list | toJson | quote }}
  seed.py: |
    #!/usr/bin/env python3
    """
    Full MetaMCP initialization: user, namespaces, endpoints, servers, mappings.
    The published MetaMCP image (v2.4.22) predates the bootstrap feature,
    so this job handles all initialization via the tRPC API.
    Idempotent — safe to re-run on every upgrade.
    """
    import json, os, sys, time, urllib.request, urllib.error

    BACKEND = "http://{{ .Release.Name }}:12009"
    TRPC = f"{BACKEND}/trpc/frontend"
    EMAIL = os.environ["BOOTSTRAP_USER_EMAIL"]
    PASSWORD = os.environ["BOOTSTRAP_USER_PASSWORD"]
    USERNAME = os.environ.get("BOOTSTRAP_USER_NAME", "Admin")

    def log(msg):
        print(f"[seed] {msg}", flush=True)

    def die(msg):
        print(f"[seed] ERROR: {msg}", file=sys.stderr, flush=True)
        sys.exit(1)

    def api_get(path, cookie):
        req = urllib.request.Request(f"{TRPC}/{path}", headers={"Cookie": cookie})
        with urllib.request.urlopen(req) as resp:
            return json.loads(resp.read())

    def api_post(path, data, cookie):
        body = json.dumps(data).encode()
        req = urllib.request.Request(
            f"{TRPC}/{path}", data=body, method="POST",
            headers={"Content-Type": "application/json", "Cookie": cookie},
        )
        with urllib.request.urlopen(req) as resp:
            return json.loads(resp.read())

    def auth_post(path, data):
        body = json.dumps(data).encode()
        req = urllib.request.Request(
            f"{BACKEND}{path}", data=body,
            headers={"Content-Type": "application/json"},
        )
        with urllib.request.urlopen(req) as resp:
            cookie = resp.headers.get("set-cookie", "")
            result = json.loads(resp.read())
            return result, cookie

    # ── Wait for backend ──
    log("Waiting for MetaMCP backend...")
    for i in range(90):
        try:
            req = urllib.request.Request(f"{BACKEND}/health")
            with urllib.request.urlopen(req, timeout=5) as resp:
                if b"ok" in resp.read():
                    break
        except Exception:
            pass
        if i == 89:
            die("Backend not ready after 180s")
        time.sleep(2)
    log("Backend ready")

    # ── Create user (sign-up, then sign-in) ──
    log(f"Authenticating as {EMAIL}...")
    cookie = ""

    # Try sign-in first (user may already exist)
    try:
        result, set_cookie = auth_post("/api/auth/sign-in/email", {
            "email": EMAIL, "password": PASSWORD,
        })
        if "better-auth.session_token=" in set_cookie:
            cookie = set_cookie.split(";")[0]
            log("Signed in (existing user)")
    except urllib.error.HTTPError:
        pass

    # If sign-in failed, create user via sign-up
    if not cookie:
        log("User not found, creating via sign-up...")
        try:
            result, set_cookie = auth_post("/api/auth/sign-up/email", {
                "email": EMAIL, "password": PASSWORD, "name": USERNAME,
            })
            if "better-auth.session_token=" in set_cookie:
                cookie = set_cookie.split(";")[0]
                log(f"Created user: {EMAIL}")
            else:
                die(f"Sign-up succeeded but no session cookie: {set_cookie}")
        except urllib.error.HTTPError as e:
            die(f"Sign-up failed: {e.code} {e.read().decode()}")

    if not cookie:
        die("Authentication failed — no session cookie obtained")

    # ── Load config ──
    with open("/config/servers.json") as f:
        servers_config = json.load(f)
    with open("/config/mappings.json") as f:
        mappings_config = json.load(f)
    with open("/config/namespaces.json") as f:
        namespaces_config = json.load(f)
    with open("/config/endpoints.json") as f:
        endpoints_config = json.load(f)

    # ── Create namespaces ──
    log("Seeding namespaces...")
    ns_resp = api_get("frontend.namespaces.list", cookie)
    ns_by_name = {ns["name"]: ns["uuid"] for ns in ns_resp["result"]["data"]["data"]}

    for ns in namespaces_config:
        name = ns["name"]
        if name in ns_by_name:
            log(f"  Namespace exists: {name}")
            continue
        try:
            resp = api_post("frontend.namespaces.create", {
                "name": name,
                "description": ns.get("description", ""),
                "mcpServerUuids": [],
            }, cookie)
            uuid = resp["result"]["data"]["data"]["uuid"]
            ns_by_name[name] = uuid
            log(f"  Created namespace: {name} -> {uuid}")
        except Exception as e:
            log(f"  WARN: Failed to create namespace {name}: {e}")

    # ── Create endpoints ──
    log("Seeding endpoints...")
    ep_resp = api_get("frontend.endpoints.list", cookie)
    ep_by_name = {ep["name"]: ep["uuid"] for ep in ep_resp["result"]["data"]["data"]}

    for ep in endpoints_config:
        name = ep["name"]
        if name in ep_by_name:
            log(f"  Endpoint exists: {name}")
            continue
        ns_name = ep.get("namespace", name)
        ns_uuid = ns_by_name.get(ns_name)
        if not ns_uuid:
            log(f"  WARN: Namespace {ns_name} not found for endpoint {name}")
            continue
        try:
            resp = api_post("frontend.endpoints.create", {
                "name": name,
                "description": ep.get("description", ""),
                "namespaceUuid": ns_uuid,
                "enableApiKeyAuth": ep.get("enable_auth", False),
            }, cookie)
            uuid = resp["result"]["data"]["data"]["uuid"]
            ep_by_name[name] = uuid
            log(f"  Created endpoint: {name} -> {uuid}")
        except Exception as e:
            log(f"  WARN: Failed to create endpoint {name}: {e}")

    # ── Create MCP servers ──
    log("Seeding MCP servers...")
    srv_resp = api_get("frontend.mcpServers.list", cookie)
    existing_servers = {s["name"]: s["uuid"] for s in srv_resp["result"]["data"]["data"]}

    for server in servers_config:
        name = server["name"]
        if name in existing_servers:
            # Update existing server to match declared state
            update_payload = dict(server, uuid=existing_servers[name])
            try:
                api_post("frontend.mcpServers.update", update_payload, cookie)
                log(f"  Updated server: {name} ({existing_servers[name]})")
            except Exception as e:
                log(f"  WARN: Failed to update server {name}: {e}")
            continue
        try:
            resp = api_post("frontend.mcpServers.create", server, cookie)
            uuid = resp["result"]["data"]["data"]["uuid"]
            existing_servers[name] = uuid
            log(f"  Created server: {name} -> {uuid}")
        except Exception as e:
            log(f"  WARN: Failed to create server {name}: {e}")

    # ── Apply namespace-server mappings ──
    log("Applying namespace-server mappings...")
    for mapping in mappings_config:
        ns_name = mapping["namespace"]
        ns_uuid = ns_by_name.get(ns_name)
        if not ns_uuid:
            log(f"  WARN: Namespace {ns_name} not found, skipping")
            continue

        server_uuids = [existing_servers[s] for s in mapping["servers"] if s in existing_servers]
        missing = [s for s in mapping["servers"] if s not in existing_servers]
        if missing:
            log(f"  WARN: Servers not found: {missing}")
        if not server_uuids:
            log(f"  WARN: No valid servers for namespace {ns_name}")
            continue

        try:
            api_post("frontend.namespaces.update", {
                "uuid": ns_uuid,
                "name": ns_name,
                "mcpServerUuids": server_uuids,
            }, cookie)
            log(f"  Mapped {mapping['servers']} -> {ns_name}")
        except Exception as e:
            log(f"  WARN: Failed to update namespace {ns_name}: {e}")

    log("Seeding complete")
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-seed-servers
  labels:
    app.kubernetes.io/name: metamcp
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: genai-mlops
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metamcp-seed
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: {{ .Values.seedServers.image }}
          command: ["python3", "/config/seed.py"]
          env:
            - name: BOOTSTRAP_USER_EMAIL
              value: {{ .Values.bootstrap.user.email | quote }}
            - name: BOOTSTRAP_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: bootstrap-password
            - name: BOOTSTRAP_USER_NAME
              value: {{ .Values.bootstrap.user.name | quote }}
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-seed-servers
            defaultMode: 0755
{{- end }}
