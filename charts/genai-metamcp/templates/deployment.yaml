apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: metamcp
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: genai-mlops
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: metamcp
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metamcp
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      containers:
        - name: metamcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 12008
              protocol: TCP
            - name: backend
              containerPort: 12009
              protocol: TCP
          env:
            # Database
            - name: POSTGRES_HOST
              value: {{ .Values.postgres.host | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
            # App
            - name: APP_URL
              value: {{ .Values.app.url | quote }}
            - name: NEXT_PUBLIC_APP_URL
              value: {{ .Values.app.url | quote }}
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: auth-secret
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: {{ .Values.app.logLevel | quote }}
            - name: TRANSFORM_LOCALHOST_TO_DOCKER_INTERNAL
              value: {{ .Values.app.transformLocalhost | quote }}
            # Bootstrap
            - name: BOOTSTRAP_ENABLE
              value: {{ .Values.bootstrap.enabled | quote }}
            - name: BOOTSTRAP_FAIL_HARD
              value: {{ .Values.bootstrap.failHard | quote }}
            - name: BOOTSTRAP_USER_EMAIL
              value: {{ .Values.bootstrap.user.email | quote }}
            - name: BOOTSTRAP_USER_NAME
              value: {{ .Values.bootstrap.user.name | quote }}
            - name: BOOTSTRAP_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: bootstrap-password
            - name: BOOTSTRAP_API_KEYS
              value: {{ .Values.bootstrap.apiKeys | quote }}
            - name: BOOTSTRAP_NAMESPACES
              value: {{ .Values.bootstrap.namespaces | quote }}
            - name: BOOTSTRAP_ENDPOINTS
              value: {{ .Values.bootstrap.endpoints | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
