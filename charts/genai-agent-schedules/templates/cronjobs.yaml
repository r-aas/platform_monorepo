{{- $targetNs := .Values.targetNamespace | default .Release.Namespace }}
{{- range $name, $agent := .Values.agents }}
{{- if $agent.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $name }}-schedule
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: genai-agent-schedules
    app.kubernetes.io/component: {{ $name }}
    agentops.dev/target-namespace: {{ $targetNs }}
spec:
  schedule: {{ $agent.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: genai-agent-schedules
            app.kubernetes.io/component: {{ $name }}
        spec:
          restartPolicy: Never
          containers:
          - name: trigger
            image: {{ $.Values.image.repository }}:{{ $.Values.image.tag }}
            imagePullPolicy: {{ $.Values.image.pullPolicy }}
            command:
            - /bin/sh
            - -c
            - |
              MSG_ID="schedule-$(date +%s)"
              PAYLOAD=$(cat <<JSONEOF
              {"jsonrpc":"2.0","method":"message/send","id":"$MSG_ID","params":{"message":{"role":"user","messageId":"$MSG_ID","parts":[{"type":"text","text":{{ $agent.task | toJson }}}]}}}
              JSONEOF
              )
              # Fire-and-forget: A2A message/send waits for LLM inference.
              # Exit 0 regardless — the agent received the message even if we timeout.
              curl -s -X POST \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" \
                "http://{{ $name }}.{{ $targetNs }}.svc.cluster.local:8080/" \
                --connect-timeout 10 \
                --max-time 240 \
                -o /dev/null -w "HTTP %{http_code}\n" \
              || true
            resources:
              {{- toYaml $.Values.resources | nindent 14 }}
{{- end }}
{{- end }}
