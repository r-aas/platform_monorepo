{{- range $name, $agent := .Values.agents }}
{{- if $agent.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: schedule-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: genai-agent-schedules
    app.kubernetes.io/component: {{ $name }}
spec:
  schedule: {{ $agent.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/component: {{ $name }}
        spec:
          restartPolicy: Never
          containers:
          - name: trigger
            image: {{ $.Values.image.repository }}:{{ $.Values.image.tag }}
            imagePullPolicy: {{ $.Values.image.pullPolicy }}
            command:
            - /bin/sh
            - -c
            - |
              MSG_ID="schedule-$(date +%s)"
              curl -sf -X POST \
                -H "Content-Type: application/json" \
                -d "{\"jsonrpc\":\"2.0\",\"method\":\"message/send\",\"id\":\"$MSG_ID\",\"params\":{\"message\":{\"role\":\"user\",\"messageId\":\"$MSG_ID\",\"parts\":[{\"type\":\"text\",\"text\":{{ $agent.task | toJson }}}]}}}" \
                "http://{{ $name }}.{{ $.Release.Namespace }}.svc.cluster.local:8080/" \
                --max-time 60 \
                -o /dev/null -w "HTTP %{http_code}\n"
            resources:
              {{- toYaml $.Values.resources | nindent 14 }}
{{- end }}
{{- end }}
