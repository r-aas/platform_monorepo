# agent-gateway — base values
replicaCount: 1

image:
  # Build from ~/work/repos/homelab/services/agent-gateway/
  # Push to: registry.mewtwo.127.0.0.1.nip.io/root/agent-gateway:latest
  repository: registry.mewtwo.127.0.0.1.nip.io/root/agent-gateway
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: agents.dev.127.0.0.1.nip.io

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# SQLite data persistence
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  mountPath: /data/agents

# Ollama on host — accessed via host.docker.internal from k3d pods
ollama:
  baseUrl: http://host.docker.internal:11434/v1
  model: qwen2.5:14b

# Environment variables injected into the pod
env: {}
  # OPENAI_API_KEY: ollama
  # LOG_LEVEL: info

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
