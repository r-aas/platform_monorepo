replicaCount: 1

image:
  repository: node
  tag: "24-alpine"
  pullPolicy: IfNotPresent

server:
  package: "mcp-server-kubernetes"
  port: 3000

rbac:
  create: true

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    memory: 256Mi
    cpu: 500m
  limits:
    memory: 1Gi
    cpu: "1.0"

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 5

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 5
