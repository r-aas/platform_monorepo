# n8n workflow engine — standalone per-namespace deployment
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.n8n.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  labels:
    app: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
        - name: n8n
          image: {{ .Values.n8n.image.repository }}:{{ .Values.n8n.image.tag }}
          ports:
            - containerPort: 5678
          env:
            # ── Database ──
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: n8n-postgres
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: n8n
            - name: DB_POSTGRESDB_USER
              value: n8n
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.postgresPasswordKey }}
            # ── n8n config ──
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.encryptionKeyKey }}
            - name: N8N_HOST
              value: {{ include "n8n-standalone.host" . }}
            - name: N8N_PROTOCOL
              value: http
            - name: N8N_PORT
              value: "5678"
            - name: WEBHOOK_URL
              value: http://{{ include "n8n-standalone.host" . }}
            - name: GENERIC_TIMEZONE
              value: {{ .Values.n8n.timezone }}
            # ── Memory limits (prevent OOM on constrained k3d VM) ──
            - name: NODE_OPTIONS
              value: "--max-old-space-size={{ .Values.n8n.nodeMaxOldSpaceSize }}"
            - name: N8N_RUNNERS_MAX_OLD_SPACE_SIZE
              value: {{ .Values.n8n.runnersMaxOldSpaceSize | quote }}
            # ── AI / Ollama ──
            - name: OPENAI_BASE_URL
              value: {{ .Values.n8n.ollama.baseUrl }}
            - name: OPENAI_API_KEY
              value: {{ .Values.n8n.ollama.apiKey }}
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          resources:
            {{- toYaml .Values.n8n.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: 5678
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  labels:
    app: n8n
spec:
  selector:
    app: n8n
  ports:
    - port: 5678
      targetPort: 5678
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.ingress.proxyBodySize | quote }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ include "n8n-standalone.host" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678
