replicaCount: 1

image:
  repository: mcp-mlflow
  tag: "latest"
  pullPolicy: IfNotPresent

server:
  port: 3000

mlflow:
  trackingUri: "http://genai-mlflow.genai.svc.cluster.local:80"

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: "0.5"

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 20
  periodSeconds: 30
  failureThreshold: 5
