# Plane CE — Project Management for k3d
# Chart: makeplane/plane-ce from https://helm.plane.so/
# Docs: https://docs.plane.so/self-hosting/methods/kubernetes
#
# Uses shared infra: PostgreSQL (genai-pg-plane), Redis (langfuse-redis), MinIO (genai-minio)
# RabbitMQ runs locally (no shared instance in stack yet)

planeVersion: stable

ingress:
  enabled: true
  appHost: "plane.genai.127.0.0.1.nip.io"
  ingressClass: "nginx"
  ingress_annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

# --- Disable bundled infra, use shared ---
postgres:
  local_setup: false

redis:
  local_setup: false

minio:
  # local_setup must be true to get USE_MINIO=1 (required for S3-compatible storage).
  # This also deploys a Plane-local MinIO pod we don't use — harmless.
  # The actual endpoint is overridden via env.aws_s3_endpoint_url below.
  local_setup: true
  root_user: minio
  root_password: minio123

# RabbitMQ — no shared instance, run locally
rabbitmq:
  local_setup: true
  image: rabbitmq:3.13.6-management-alpine
  volumeSize: 200Mi
  # Disable persistence — sshfs doesn't support chown (k3d/Colima)
  storageClass: ""
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: "0.5"

# --- Override images to Docker Hub for ARM64 ---
web:
  image: makeplane/plane-frontend
  pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 50Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: "0.5"

space:
  image: makeplane/plane-space
  pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 50Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: "0.5"

admin:
  image: makeplane/plane-admin
  pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 50Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: "0.5"

live:
  image: makeplane/plane-live
  pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 50Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: "0.5"

api:
  image: makeplane/plane-backend
  pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: "1.0"

worker:
  image: makeplane/plane-backend
  pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: "1.0"

beatworker:
  image: makeplane/plane-backend
  pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: "0.5"

env:
  # External PostgreSQL (genai-pg-plane in same namespace)
  pgdb_remote_url: "postgresql://plane:plane@genai-pg-plane.genai.svc.cluster.local:5432/plane"

  # External Redis (reuse langfuse redis — it's a general-purpose Valkey)
  remote_redis_url: "redis://:valkey-langfuse@genai-langfuse-redis-primary.genai.svc.cluster.local:6379/"

  # External MinIO (shared genai-minio)
  # Endpoint must be browser-reachable for presigned upload URLs.
  # Plane ingress routes /plane-uploads → genai-minio:9000.
  docstore_bucket: "plane-uploads"
  aws_access_key: "minio"
  aws_secret_access_key: "minio123"
  aws_region: ""
  aws_s3_endpoint_url: "http://plane.genai.127.0.0.1.nip.io"

  # Secrets (generate real ones for prod)
  secret_key: "plane-k3d-dev-secret-key-change-in-prod"
  live_server_secret_key: "plane-k3d-dev-live-secret-change-in-prod"
