n8n:
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    hosts:
      - host: n8n.platform.127.0.0.1.nip.io
        paths:
          - path: /
            pathType: Prefix
  main:
    persistence:
      enabled: true
      storageClass: local-path
