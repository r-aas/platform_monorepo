# n8n workflow engine — uses external PostgreSQL from genai-pg-n8n
n8n:
  fullnameOverride: genai-n8n
  # Encryption key from k8s secret (must have key N8N_ENCRYPTION_KEY)
  existingEncryptionKeySecret: "genai-n8n-encryption-key-secret-v2"
  image:
    tag: "1.123.21"
  resources:
    requests:
      memory: 1Gi
      cpu: 250m
    limits:
      memory: 2Gi
      cpu: "1.0"
  main:
    extraEnvVars:
      # LLM proxy — agentgateway (Rust) replaces LiteLLM
      INFERENCE_BASE_URL: "http://genai-agentgateway-llm.genai.svc.cluster.local:4000/v1"
      INFERENCE_DEFAULT_MODEL: "qwen2.5:14b"
      INFERENCE_ALLOWED_MODELS: "qwen2.5:14b,qwen2.5:7b,mistral:7b-instruct,gemma3:12b,nomic-embed-text"
      LITELLM_BASE_URL: "http://genai-agentgateway-llm.genai.svc.cluster.local:4000"
      # YouTube pipeline
      YT_ANALYSIS_MODEL: "glm-4.7-flash"
      YT_INGEST_URL: "http://192.168.65.254:7778"
      # MLflow tracking (in-cluster)
      MLFLOW_TRACKING_URI: "http://genai-mlflow.genai.svc.cluster.local"
      # Ollama direct (host via Docker Desktop gateway — host.k3d.internal)
      OLLAMA_BASE_URL: "http://192.168.65.254:11434"
      # Plane project management (in-cluster)
      PLANE_API_URL: "http://genai-plane-api.genai.svc.cluster.local:8000"
      # GitLab (in-cluster)
      GITLAB_URL: "http://gitlab-ce.platform.svc.cluster.local:8181"
      # n8n settings
      N8N_PUBLIC_API_ENABLED: "true"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      NODE_FUNCTION_ALLOW_EXTERNAL: "axios"
    # Sensitive env vars from k8s secret (LITELLM_API_KEY, PLANE_API_TOKEN, GITLAB_PAT)
    extraSecretNamesForEnvFrom:
      - n8n-env-secrets
  db:
    type: postgresdb
  postgresql:
    enabled: false
  externalPostgresql:
    host: "genai-pg-n8n.genai.svc.cluster.local"
    port: 5432
    username: n8n
    database: n8n
    existingSecret: "genai-pg-n8n"

# ── Workflow Promotion (GitOps) ─────────────────────────
# Clones workflow JSONs from the platform monorepo on every deploy,
# patches URLs, and upserts into n8n via REST API.
workflowPromotion:
  enabled: true
  # Same repo ArgoCD syncs — workflows live here now
  gitUrl: "http://gitlab-ce.platform.svc.cluster.local:8181/root/platform_monorepo.git"
  gitBranch: main
  workflowPath: "n8n-data/workflows"
  # k8s secret containing 'gitlab-pat' key
  gitSecretName: "gitlab-pat"
  # k8s secret containing 'api-key' key (created by n8n-setup.sh)
  apiSecretName: "n8n-api-credentials"
  # Service URLs for k3d networking (replaces docker-compose URLs)
  urls:
    mlflow: "http://genai-mlflow.genai.svc.cluster.local"
    litellm: "http://genai-agentgateway-llm.genai.svc.cluster.local:4000"
    n8n: "http://genai-n8n.genai.svc.cluster.local:5678"
    ollama: "http://192.168.65.254:11434"
  # Webhook-bearing workflows to activate (sub-workflows must NOT be activated)
  activateWorkflows:
    - prompt-crud-v1
    - prompt-eval-v1
    - openai-compat-v1
    - mlflow-data-v1
    - mlflow-experiments-v1
    - chat-v1
    - a2a-server-v1
    - trace-v1
    - sessions-v1
    - agents-v1
