# ═══════════════════════════════════════════════════════
# Workflow Promotion Job — GitOps for n8n workflows
#
# Runs after every Helm install/upgrade. Clones workflow
# JSONs from in-cluster GitLab, patches URLs for k3d,
# and upserts into n8n via REST API.
#
# Replaces manual: task n8n-import
# ═══════════════════════════════════════════════════════
{{- if .Values.workflowPromotion.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-workflow-promote-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: genai-n8n
    app.kubernetes.io/component: workflow-promotion
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: genai-n8n
        app.kubernetes.io/component: workflow-promotion
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: clone-workflows
        image: alpine/git:2.43.0
        command: ["/bin/sh", "-c"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        args:
        - |
          set -e
          REPO_URL="{{ .Values.workflowPromotion.gitUrl }}"
          # Inject GitLab PAT if available
          if [ -f /secrets/gitlab-pat ]; then
            PAT=$(cat /secrets/gitlab-pat)
            REPO_URL=$(echo "$REPO_URL" | sed "s|://|://root:${PAT}@|")
          fi
          # Retry clone — GitLab may still be booting during first install
          for attempt in 1 2 3; do
            if git clone --depth 1 --single-branch --branch {{ .Values.workflowPromotion.gitBranch }} \
              "$REPO_URL" /repo 2>/dev/null; then
              break
            fi
            echo "Clone attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          if [ ! -d /repo ]; then
            echo "ERROR: Could not clone repo after 3 attempts"
            exit 1
          fi
          cp /repo/{{ .Values.workflowPromotion.workflowPath }}/*.json /workflows/ 2>/dev/null || {
            echo "ERROR: No workflow JSONs found at {{ .Values.workflowPromotion.workflowPath }}/"
            exit 1
          }
          echo "Cloned $(ls /workflows/*.json | wc -l) workflows"
        volumeMounts:
        - name: workflows
          mountPath: /workflows
        {{- if .Values.workflowPromotion.gitSecretName }}
        - name: git-secret
          mountPath: /secrets
          readOnly: true
        {{- end }}
      containers:
      - name: promote
        image: python:3.12-alpine
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        env:
        - name: N8N_OWNER_EMAIL
          value: "{{ .Values.workflowPromotion.ownerEmail | default "admin@platform.local" }}"
        - name: N8N_OWNER_PASSWORD
          value: "{{ .Values.workflowPromotion.ownerPassword | default "Admin-k3d-L0cal" }}"
        - name: N8N_OWNER_FIRST
          value: "{{ .Values.workflowPromotion.ownerFirstName | default "Admin" }}"
        - name: N8N_OWNER_LAST
          value: "{{ .Values.workflowPromotion.ownerLastName | default "Platform" }}"
        - name: OLLAMA_URL
          value: "{{ .Values.workflowPromotion.urls.ollama }}"
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          apk add --no-cache curl jq > /dev/null 2>&1

          N8N_URL="http://{{ .Values.n8n.fullnameOverride | default "genai-n8n" }}:5678"
          WORKFLOWS_DIR="/workflows"

          # ── Wait for n8n to be ready (5 min max) ──────────
          echo "Waiting for n8n..."
          N8N_READY=false
          for i in $(seq 1 60); do
            if curl -sf "$N8N_URL/healthz" > /dev/null 2>&1; then
              echo "  n8n ready"
              N8N_READY=true
              break
            fi
            sleep 5
          done
          if [ "$N8N_READY" = "false" ]; then
            echo "ERROR: n8n not ready after 5 minutes"
            exit 1
          fi

          # ── Obtain API key (self-healing) ─────────────────
          # Try existing key from secret first
          N8N_KEY=""
          if [ -f /secrets/api-key ]; then
            N8N_KEY=$(cat /secrets/api-key)
          fi

          # Verify it works
          KEY_VALID=false
          if [ -n "$N8N_KEY" ]; then
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              "$N8N_URL/api/v1/workflows?limit=1" \
              -H "X-N8N-API-KEY: $N8N_KEY")
            [ "$HTTP" = "200" ] && KEY_VALID=true
          fi

          # If no key or stale key, bootstrap owner + generate new key
          if [ "$KEY_VALID" = "false" ]; then
            echo "  API key missing or stale — bootstrapping..."

            # Try to create owner (idempotent — fails if exists)
            curl -sf -X POST "$N8N_URL/api/v1/owner/setup" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$N8N_OWNER_EMAIL\",\"password\":\"$N8N_OWNER_PASSWORD\",\"firstName\":\"$N8N_OWNER_FIRST\",\"lastName\":\"$N8N_OWNER_LAST\"}" \
              > /dev/null 2>&1 || true

            # Login to get cookie
            COOKIE_JAR=$(mktemp)
            LOGIN_RESP=$(curl -sf -c "$COOKIE_JAR" -X POST "$N8N_URL/api/v1/login" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$N8N_OWNER_EMAIL\",\"password\":\"$N8N_OWNER_PASSWORD\"}" 2>/dev/null || echo "{}")

            if echo "$LOGIN_RESP" | jq -e '.data' > /dev/null 2>&1; then
              echo "  Logged in, creating API key..."
              # Delete existing API keys and create fresh one
              KEY_RESP=$(curl -sf -b "$COOKIE_JAR" -X POST "$N8N_URL/api/v1/me/api-keys" \
                -H "Content-Type: application/json" \
                -d '{"label":"workflow-promotion"}' 2>/dev/null || echo "{}")
              N8N_KEY=$(echo "$KEY_RESP" | jq -r '.apiKey // empty' 2>/dev/null)

              if [ -n "$N8N_KEY" ]; then
                echo "  ✓ API key generated"
                # Update the k8s secret so future runs have the key
                # (requires RBAC — if this fails, manual task n8n-setup needed)
                python3 -c "
          import json, base64, urllib.request, os, ssl
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          token_path = '/var/run/secrets/kubernetes.io/serviceaccount/token'
          if not os.path.exists(token_path):
              print('  No SA token — cannot update secret')
              exit(0)
          token = open(token_path).read()
          ns = open('/var/run/secrets/kubernetes.io/serviceaccount/namespace').read()
          api = f'https://kubernetes.default.svc/api/v1/namespaces/{ns}/secrets/{{ .Values.workflowPromotion.apiSecretName }}'
          key = os.environ.get('N8N_KEY_VALUE', '')
          email = os.environ.get('N8N_OWNER_EMAIL', '')
          password = os.environ.get('N8N_OWNER_PASSWORD', '')
          patch = {'data': {
              'api-key': base64.b64encode(key.encode()).decode(),
              'owner-email': base64.b64encode(email.encode()).decode(),
              'owner-password': base64.b64encode(password.encode()).decode()
          }}
          req = urllib.request.Request(api, data=json.dumps(patch).encode(),
              headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/strategic-merge-patch+json'},
              method='PATCH')
          try:
              urllib.request.urlopen(req, context=ctx)
              print('  ✓ Secret updated')
          except Exception as e:
              print(f'  ⚠ Could not update secret: {e}')
          " 2>/dev/null || true
              else
                echo "  ⚠ Could not generate API key"
              fi
            else
              echo "  ⚠ Login failed — cannot bootstrap"
            fi
            rm -f "$COOKIE_JAR"
          fi

          export N8N_KEY_VALUE="$N8N_KEY"

          if [ -z "$N8N_KEY" ]; then
            echo "ERROR: No working API key — cannot promote workflows"
            exit 1
          fi

          # ── Patch URLs for k3d ────────────────────────────
          echo "Patching service URLs..."
          mkdir -p /patched
          for f in "$WORKFLOWS_DIR"/*.json; do
            name=$(basename "$f")
            sed \
              -e 's|http://mlflow:5050|{{ .Values.workflowPromotion.urls.mlflow }}|g' \
              -e 's|http://litellm:4000|{{ .Values.workflowPromotion.urls.litellm }}|g' \
              -e 's|http://n8n:5678|{{ .Values.workflowPromotion.urls.n8n }}|g' \
              -e 's|http://localhost:5678|{{ .Values.workflowPromotion.urls.n8n }}|g' \
              -e 's|http://host.docker.internal:11434|{{ .Values.workflowPromotion.urls.ollama }}|g' \
              "$f" > "/patched/$name"
          done

          # ── Upsert workflows via REST API ─────────────────
          TOTAL=0
          UPDATED=0
          for f in /patched/*.json; do
            name=$(basename "$f")
            WF_ID=$(python3 -c "import json; print(json.load(open('$f'))['id'])" 2>/dev/null || true)
            WF_NAME=$(python3 -c "import json; print(json.load(open('$f'))['name'])" 2>/dev/null || true)
            TOTAL=$((TOTAL + 1))

            if [ -z "$WF_ID" ]; then
              echo "  ⚠ Skip $name (no id)"
              continue
            fi

            # Check if workflow exists
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              "$N8N_URL/api/v1/workflows/$WF_ID" \
              -H "X-N8N-API-KEY: $N8N_KEY")

            if [ "$HTTP" = "200" ]; then
              # Update existing
              curl -sf -X PUT "$N8N_URL/api/v1/workflows/$WF_ID" \
                -H "X-N8N-API-KEY: $N8N_KEY" \
                -H "Content-Type: application/json" \
                -d @"$f" > /dev/null 2>&1 && UPDATED=$((UPDATED + 1)) || echo "  ⚠ Failed to update $WF_NAME"
            else
              # Create new
              curl -sf -X POST "$N8N_URL/api/v1/workflows" \
                -H "X-N8N-API-KEY: $N8N_KEY" \
                -H "Content-Type: application/json" \
                -d @"$f" > /dev/null 2>&1 && UPDATED=$((UPDATED + 1)) || echo "  ⚠ Failed to create $WF_NAME"
            fi
          done
          echo "  ✓ $UPDATED/$TOTAL workflows promoted"

          # ── Activate webhook-bearing workflows ────────────
          echo "Activating webhook workflows..."
          ACTIVATED=0
          for wf_id in {{ join " " .Values.workflowPromotion.activateWorkflows }}; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH "$N8N_URL/api/v1/workflows/$wf_id" \
              -H "X-N8N-API-KEY: $N8N_KEY" \
              -H "Content-Type: application/json" \
              -d '{"active":true}')
            [ "$HTTP" = "200" ] && ACTIVATED=$((ACTIVATED + 1))
          done
          echo "  ✓ $ACTIVATED workflows activated"

          # ── Patch Ollama credential ───────────────────────
          echo "Patching Ollama credential..."
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, sys

          API_URL = os.environ.get("N8N_URL", "http://genai-n8n:5678") + "/api/v1"
          API_KEY = os.environ.get("N8N_KEY_VALUE", "")
          OLLAMA_URL = os.environ.get("OLLAMA_URL", "http://192.168.5.2:11434")

          if not API_KEY:
              print("  ⚠ No API key — skipping credential patch")
              sys.exit(0)

          def api(method, path, data=None):
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(
                  f"{API_URL}{path}", data=body,
                  headers={"X-N8N-API-KEY": API_KEY, "Content-Type": "application/json"},
                  method=method)
              return json.loads(urllib.request.urlopen(req).read())

          # Create or find Ollama credential
          cred_id = None
          try:
              resp = api("POST", "/credentials", {
                  "name": "Ollama Local",
                  "type": "ollamaApi",
                  "data": {"baseUrl": OLLAMA_URL}
              })
              cred_id = resp.get("id")
              print(f"  Created Ollama credential: {cred_id}")
          except urllib.error.HTTPError as e:
              if e.code == 409:
                  # Already exists — find via chat-v1 workflow
                  try:
                      wf = api("GET", "/workflows/chat-v1")
                      for n in wf.get("nodes", []):
                          if n.get("name") == "Ollama Chat Model":
                              cid = n.get("credentials", {}).get("ollamaApi", {}).get("id", "")
                              if cid:
                                  cred_id = cid
                                  break
                  except Exception:
                      pass
                  if cred_id:
                      print(f"  Found existing Ollama credential: {cred_id}")
              if not cred_id:
                  print(f"  ⚠ Ollama credential issue: {e}")

          if cred_id:
              # Patch chat-v1 workflow's Ollama Chat Model node
              try:
                  wf = api("GET", "/workflows/chat-v1")
                  patched = False
                  for node in wf.get("nodes", []):
                      if node.get("name") == "Ollama Chat Model":
                          node.setdefault("credentials", {}).setdefault("ollamaApi", {})["id"] = cred_id
                          patched = True
                  if patched:
                      api("PUT", "/workflows/chat-v1", {
                          "name": wf["name"], "nodes": wf["nodes"],
                          "connections": wf["connections"],
                          "settings": wf.get("settings", {}),
                          **({"staticData": wf["staticData"]} if "staticData" in wf else {})
                      })
                      print("  ✓ Patched Chat with Ollama credential")
              except Exception as e:
                  print(f"  ⚠ Failed to patch chat-v1: {e}")
          PYEOF

          # ── Ensure __sessions MLflow experiment ───────────
          echo -n "Ensuring __sessions experiment..."
          MLFLOW_URL="{{ .Values.workflowPromotion.urls.mlflow }}"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "${MLFLOW_URL}/api/2.0/mlflow/experiments/get-by-name?experiment_name=__sessions" 2>/dev/null || echo "000")
          if [ "$HTTP" = "200" ]; then
            echo " exists"
          else
            curl -sf -X POST "${MLFLOW_URL}/api/2.0/mlflow/experiments/create" \
              -H "Content-Type: application/json" \
              -d '{"name":"__sessions"}' > /dev/null 2>&1 && echo " created" || echo " ⚠ could not create"
          fi

          echo "Done."
        env:
        - name: N8N_URL
          value: "http://{{ .Values.n8n.fullnameOverride | default "genai-n8n" }}:5678"
        volumeMounts:
        - name: workflows
          mountPath: /workflows
          readOnly: true
        {{- if .Values.workflowPromotion.apiSecretName }}
        - name: api-secret
          mountPath: /secrets
          readOnly: true
        {{- end }}
      volumes:
      - name: workflows
        emptyDir: {}
      {{- if .Values.workflowPromotion.gitSecretName }}
      - name: git-secret
        secret:
          secretName: {{ .Values.workflowPromotion.gitSecretName }}
      {{- end }}
      {{- if .Values.workflowPromotion.apiSecretName }}
      - name: api-secret
        secret:
          secretName: {{ .Values.workflowPromotion.apiSecretName }}
      {{- end }}
{{- end }}
