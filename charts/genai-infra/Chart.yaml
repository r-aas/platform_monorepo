apiVersion: v2
name: genai-infra
description: Infrastructure tier for the GenAI MLOps platform (databases, object storage)
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: minio
    version: "5.4.0"
    repository: "https://charts.min.io"
    condition: minio.enabled

  - name: postgresql
    alias: n8n-postgresql
    version: "18.5.6"
    repository: "https://charts.bitnami.com/bitnami"
    condition: n8n-postgresql.enabled

  - name: postgresql
    alias: mlflow-postgresql
    version: "18.5.6"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mlflow-postgresql.enabled

  - name: postgresql
    alias: langfuse-postgresql
    version: "18.5.6"
    repository: "https://charts.bitnami.com/bitnami"
    condition: langfuse-postgresql.enabled

  - name: postgresql
    alias: pgvector
    version: "18.5.6"
    repository: "https://charts.bitnami.com/bitnami"
    condition: pgvector.enabled

  - name: neo4j
    version: "2026.2.2"
    repository: "https://helm.neo4j.com/neo4j"
    condition: neo4j.enabled
