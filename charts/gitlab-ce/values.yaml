# GitLab CE Omnibus Helm Chart — Default Values

image:
  repository: gitlab/gitlab-ce
  tag: 18.10.0-ce.0
  pullPolicy: IfNotPresent

# External URLs (override in values-k3d.yaml)
externalUrl: "http://gitlab.local"
registryExternalUrl: "http://registry.local"
sshPort: 2222

# gitlab.rb performance tuning
omnibus:
  pumaWorkers: 2
  sidekiqConcurrency: 5
  sharedBuffers: "256MB"
  prometheusMonitoring: false

# Initial root password — use existingSecret or override via --set
# Default empty: seed-secrets.sh creates gitlab-root-password secret
initialRootPassword: ""
existingRootPasswordSecret: "gitlab-root-password"

# Resource limits
resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

# Storage
persistence:
  storageClass: ""
  config:
    size: 1Gi
  data:
    size: 10Gi
  logs:
    size: 1Gi

# Service
service:
  type: ClusterIP
  webPort: 80
  sshPort: 2222
  registryPort: 5050

# Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    gitlab: gitlab.local
    registry: registry.local

# Health probes — omnibus first-boot takes ~8 min
probes:
  readiness:
    initialDelaySeconds: 180
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 40
  liveness:
    initialDelaySeconds: 600
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 10

# GitLab Runner — managed separately by ArgoCD (charts/gitlab-runner)
runner:
  enabled: false
