apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: mcp-n8n
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: genai-mlops
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-n8n
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-n8n
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: mcp-n8n
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: MCP_MODE
              value: "http"
            - name: AUTH_TOKEN
              value: {{ .Values.server.authToken | quote }}
            - name: PORT
              value: {{ .Values.server.port | quote }}
            - name: N8N_API_URL
              value: {{ .Values.n8n.apiUrl | quote }}
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.n8n.apiKeySecret }}
                  key: {{ .Values.n8n.apiKeySecretKey }}
            - name: N8N_MCP_TELEMETRY_DISABLED
              value: "true"
            - name: LOG_LEVEL
              value: "error"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
