replicaCount: 1

image:
  repository: mcp-ollama
  tag: "latest"
  pullPolicy: IfNotPresent

server:
  port: 3000

ollama:
  # Mac host via Colima gateway — Ollama runs natively for Metal GPU
  host: "http://192.168.5.2:11434"

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: "0.5"

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 20
  periodSeconds: 30
  failureThreshold: 5
