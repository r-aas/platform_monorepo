replicaCount: 1

image:
  repository: mcp-minio
  tag: "latest"
  pullPolicy: IfNotPresent

server:
  port: 3000

minio:
  endpoint: "http://genai-minio.genai.svc.cluster.local:9000"
  region: "us-east-1"
  existingSecret: "genai-minio"
  accessKeyKey: "rootUser"
  secretKeyKey: "rootPassword"

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: "0.5"

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 20
  periodSeconds: 30
  failureThreshold: 5
