datahub:
  global:
    datahub:
      version: v1.4.0.3
      gms:
        port: "8080"
      appVersion: "1.0"
      # Auth — disabled for local k3d dev cluster
      metadata_service_authentication:
        enabled: false
      systemUpdate:
        enabled: true
    graph_service_impl: elasticsearch
    elasticsearch:
      host: "elasticsearch-master"
      port: "9200"
    kafka:
      bootstrap:
        server: "genai-datahub-prereqs-kafka:9092"
      zookeeper:
        server: "genai-datahub-prereqs-zookeeper:2181"
      schemaregistry:
        url: "http://genai-datahub-prereqs-cp-schema-registry:8081"
    sql:
      datasource:
        host: "genai-datahub-prereqs-mysql:3306"
        hostForMysqlClient: "genai-datahub-prereqs-mysql"
        port: "3306"
        url: "jdbc:mysql://genai-datahub-prereqs-mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8&enabledTLSProtocols=TLSv1.2"
        driver: "com.mysql.cj.jdbc.Driver"
        username: "root"
        password:
          secretRef: mysql-secrets
          secretKey: mysql-root-password

  # GMS
  datahub-gms:
    enabled: true
    resources:
      requests:
        memory: 1Gi
        cpu: 250m
      limits:
        memory: 2Gi
        cpu: "1"

  # Frontend
  datahub-frontend:
    enabled: true
    resources:
      requests:
        memory: 512Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: "0.5"

  # Actions (metadata automation)
  datahub-actions:
    enabled: true
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: "0.5"

  # Ingestion CronJob — disabled for initial deploy, enable after GMS healthy
  datahub-ingestion-cron:
    enabled: false

  # Prerequisites deployed separately
  cp-kafka:
    enabled: false
  cp-zookeeper:
    enabled: false
  elasticsearch:
    enabled: false
  mysql:
    enabled: false
  neo4j:
    enabled: false

  # MySQL setup job — env vars are auto-populated from global.sql
  mysqlSetupJob:
    enabled: true

  elasticsearchSetupJob:
    enabled: true

  kafkaSetupJob:
    enabled: true
