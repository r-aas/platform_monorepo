image:
  repository: acuvity/mcp-server-datahub
  tag: latest
  pullPolicy: IfNotPresent
  # If no ARM64 image available, uncomment:
  # platform: linux/amd64

replicas: 1

service:
  port: 8000

env:
  DATAHUB_GMS_URL: "http://genai-datahub-datahub-gms.genai.svc.cluster.local:8080"
  # DATAHUB_GMS_TOKEN injected from k8s secret "datahub-tokens"
  DATAHUB_GMS_TOKEN: ""

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: "0.5"
