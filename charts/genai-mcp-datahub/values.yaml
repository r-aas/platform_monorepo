image:
  repository: acuvity/mcp-server-datahub
  tag: latest
  pullPolicy: IfNotPresent
  # If no ARM64 image available, uncomment:
  # platform: linux/amd64

replicas: 1

service:
  port: 3000

env:
  DATAHUB_GMS_URL: "http://datahub-datahub-gms.genai.svc.cluster.local:8080"

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: "0.5"
