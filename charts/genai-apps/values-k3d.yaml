# GenAI MLOps — Application Tier (k3d local overrides)

# Ingress via nip.io
n8n:
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: n8n.genai.127.0.0.1.nip.io
        paths:
          - path: /
            pathType: Prefix
  main:
    persistence:
      enabled: true
      storageClass: local-path

mlflow:
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: mlflow.genai.127.0.0.1.nip.io
        paths:
          - path: /
            pathType: Prefix

langfuse:
  langfuse:
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: langfuse.genai.127.0.0.1.nip.io
          paths:
            - path: /
              pathType: Prefix
