# GenAI MLOps — Application Tier
# Production defaults. Override with values-k3d.yaml for local dev.

global:
  # LLM inference (Ollama on host)
  inference:
    baseUrl: "http://host.docker.internal:11434/v1"
    apiKey: "ollama"
    model: "qwen2.5:14b"
  # MinIO from infra tier
  minio:
    endpoint: "genai-infra-minio.genai.svc.cluster.local:9000"
    accessKey: minio
    secretKey: minio123
  # Inter-service references (computed from release name)
  langfuse:
    host: "http://genai-apps-langfuse-web.genai.svc.cluster.local:3000"
  mlflow:
    trackingUri: "http://genai-apps-mlflow.genai.svc.cluster.local:5000"

# -- n8n (workflow engine)
n8n:
  image:
    tag: "1.123.21"
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: "1.0"
  # Use external PostgreSQL from infra tier
  db:
    type: postgresdb
  postgresql:
    enabled: false
  externalPostgresql:
    host: "genai-infra-n8n-postgresql.genai.svc.cluster.local"
    port: 5432
    username: n8n
    password: n8n
    database: n8n

# -- MLflow (experiment tracking)
mlflow:
  backendStore:
    postgres:
      enabled: true
      host: "genai-infra-mlflow-postgresql.genai.svc.cluster.local"
      port: 5432
      user: mlflow
      password: mlflow
      database: mlflow
  postgresql:
    enabled: false
  artifactRoot:
    s3:
      enabled: true
      bucket: mlflow
      awsAccessKeyId: minio
      awsSecretAccessKey: minio123
  extraEnvVars:
    MLFLOW_S3_ENDPOINT_URL: "http://genai-infra-minio.genai.svc.cluster.local:9000"

# -- Langfuse (LLM observability)
langfuse:
  langfuse:
    image:
      tag: "3"
    salt:
      value: "genai-mlops-langfuse-salt-k3d"
    nextauth:
      secret:
        value: "genai-mlops-nextauth-secret-k3d"
  # Use bundled ClickHouse + Redis, external PostgreSQL + MinIO
  postgresql:
    deploy: false
    host: "genai-infra-langfuse-postgresql.genai.svc.cluster.local"
    port: 5432
    auth:
      username: langfuse
      password: langfuse
      database: langfuse
  clickhouse:
    deploy: true
    host: "genai-apps-clickhouse"
    auth:
      password: clickhouse123
  redis:
    deploy: true
    host: "genai-apps-redis-primary"
  s3:
    deploy: false
    endpoint: "http://genai-infra-minio.genai.svc.cluster.local:9000"
    accessKeyId:
      value: minio
    secretAccessKey:
      value: minio123
    bucket: langfuse
    region: us-east-1
    forcePathStyle: true

# -- LiteLLM (LLM proxy)
litellm:
  enabled: true
  config:
    model_list:
      - model_name: "qwen2.5:14b"
        litellm_params:
          model: "openai/qwen2.5:14b"
          api_base: "http://host.docker.internal:11434/v1"
          api_key: "ollama"
      - model_name: "nomic-embed-text"
        litellm_params:
          model: "openai/nomic-embed-text"
          api_base: "http://host.docker.internal:11434/v1"
          api_key: "ollama"
    litellm_settings:
      drop_params: true
      num_retries: 2
      request_timeout: 120
      success_callback: ["mlflow", "langfuse"]
  env:
    MLFLOW_TRACKING_URI: "http://genai-apps-mlflow.genai.svc.cluster.local:5000"
    LANGFUSE_HOST: "http://genai-apps-langfuse-web.genai.svc.cluster.local:3000"

# -- Streaming Proxy
streaming-proxy:
  enabled: false  # Requires custom image build first
  env:
    N8N_BASE_URL: "http://genai-apps-n8n.genai.svc.cluster.local:5678"
    LITELLM_BASE_URL: "http://genai-apps-litellm.genai.svc.cluster.local:4000"

# -- MCP Gateway
mcp-gateway:
  enabled: false  # Requires Docker socket access, complex in k8s
