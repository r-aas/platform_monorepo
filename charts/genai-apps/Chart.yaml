apiVersion: v2
name: genai-apps
description: Application tier for the GenAI MLOps platform (workflow engine, observability, proxies)
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: n8n
    version: "1.16.31"
    repository: "https://community-charts.github.io/helm-charts"
    condition: n8n.enabled

  - name: mlflow
    version: "1.8.1"
    repository: "https://community-charts.github.io/helm-charts"
    condition: mlflow.enabled

  - name: langfuse
    version: "1.5.22"
    repository: "https://langfuse.github.io/langfuse-k8s"
    condition: langfuse.enabled

  - name: litellm
    repository: "file://../litellm"
    version: "0.1.0"
    condition: litellm.enabled

  - name: streaming-proxy
    repository: "file://../streaming-proxy"
    version: "0.1.0"
    condition: streaming-proxy.enabled

  - name: mcp-gateway
    repository: "file://../mcp-gateway"
    version: "0.1.0"
    condition: mcp-gateway.enabled
