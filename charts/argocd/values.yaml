# ArgoCD — Minimal local dev configuration
# Uses official argo/argo-cd chart; these values override defaults.

# Disable components not needed locally
dex:
  enabled: false
notifications:
  enabled: false
applicationSet:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Server
server:
  extraArgs:
    - --insecure
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Repo server (clones git repos — needs headroom for Helm template rendering)
# OOMKilled at 512Mi when rendering genai-infra (6 subchart dependencies)
repoServer:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Application controller (reconciliation loop)
controller:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Bundled Redis
redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

configs:
  params:
    # Poll git repos every 3 minutes
    timeout.reconciliation: 180s
  # Repo credentials managed via k8s secret (argocd-repo-gitlab),
  # created by scripts/gitlab-bootstrap.sh. Not in configmap.
