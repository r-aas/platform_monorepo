# ArgoCD — Minimal local dev configuration
# Uses official argo/argo-cd chart; these values override defaults.

# Disable components not needed locally
dex:
  enabled: false
notifications:
  enabled: false
applicationSet:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Server
server:
  extraArgs:
    - --insecure
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Repo server (clones git repos — needs headroom for Helm template rendering)
# 18 charts with helm dep build running concurrently needs more memory
repoServer:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

# Application controller (reconciliation loop)
controller:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Bundled Redis
redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

configs:
  params:
    # Poll git repos every 30 seconds
    timeout.reconciliation: 30s
  # Repo credentials managed via k8s secret (argocd-repo-gitlab),
  # created by scripts/gitlab-bootstrap.sh. Not in configmap.
  # Helm repositories needed by wrapper charts (helm dependency build)
  repositories:
    bitnami:
      url: https://charts.bitnami.com/bitnami
      name: bitnami
      type: helm
    community-charts:
      url: https://community-charts.github.io/helm-charts
      name: community-charts
      type: helm
    airflow:
      url: https://airflow.apache.org
      name: airflow
      type: helm
    langfuse:
      url: https://langfuse.github.io/langfuse-k8s
      name: langfuse
      type: helm
    minio:
      url: https://charts.min.io
      name: minio
      type: helm
    neo4j:
      url: https://helm.neo4j.com/neo4j
      name: neo4j
      type: helm
