kagent:
  # ──────────────────────────────────────────────
  # Database — use existing pgvector instance
  # ──────────────────────────────────────────────
  database:
    postgres:
      url: "postgresql://pgvector:pgvector@genai-pgvector.genai.svc.cluster.local:5432/kagent"
      vectorEnabled: true
      bundled:
        enabled: false

  # ──────────────────────────────────────────────
  # Controller
  # ──────────────────────────────────────────────
  controller:
    replicas: 1
    loglevel: "info"
    watchNamespaces:
      - genai
      - genai-dev
      - genai-stage
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi

  # ──────────────────────────────────────────────
  # UI — exposed via ingress
  # ──────────────────────────────────────────────
  ui:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # ──────────────────────────────────────────────
  # LLM Provider — LiteLLM proxy to Ollama
  # ──────────────────────────────────────────────
  providers:
    default: openAI
    openAI:
      provider: OpenAI
      model: "glm-4.7-flash"
      apiKeySecretRef: kagent-litellm
      apiKeySecretKey: OPENAI_API_KEY
      config:
        baseUrl: "http://genai-litellm.genai.svc.cluster.local:4000/v1"

  # ──────────────────────────────────────────────
  # Built-in agents — only k8s + helm relevant
  # ──────────────────────────────────────────────
  agents:
    k8s-agent:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    helm-agent:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    # Disable agents we don't use
    kgateway-agent:
      enabled: false
    istio-agent:
      enabled: false
    promql-agent:
      enabled: false
    observability-agent:
      enabled: false
    argo-rollouts-agent:
      enabled: false
    cilium-policy-agent:
      enabled: false
    cilium-manager-agent:
      enabled: false
    cilium-debug-agent:
      enabled: false

  # ──────────────────────────────────────────────
  # Tools — disable unused
  # ──────────────────────────────────────────────
  tools:
    grafana-mcp:
      enabled: false
    querydoc:
      enabled: false

  # ──────────────────────────────────────────────
  # Observability — OTEL tracing → Langfuse
  # ──────────────────────────────────────────────
  # NOTE: kagent hardcodes the gRPC OTLP exporter (opentelemetry.exporter.otlp.proto.grpc)
  # but Langfuse only accepts OTLP over HTTP at /api/public/otel/v1/traces.
  # An OpenTelemetry Collector is required as a bridge:
  #   kagent (gRPC) → otel-collector (gRPC:4317 → HTTP) → Langfuse OTLP endpoint
  # The collector chart is tracked as a separate task.
  # Endpoint below points to where the collector will listen (gRPC port 4317).
  # Langfuse direct endpoint (for reference):
  #   http://genai-langfuse-web.genai.svc.cluster.local:3000/api/public/otel
  # Langfuse auth requires OTEL_EXPORTER_OTLP_HEADERS with Basic auth
  #   (base64 of LANGFUSE_PUBLIC_KEY:LANGFUSE_SECRET_KEY) — configured on the collector.
  otel:
    tracing:
      enabled: true
      exporter:
        otlp:
          endpoint: "genai-otel-collector.genai.svc.cluster.local:4317"
          protocol: "grpc"
          timeout: 15
          insecure: true
    logging:
      enabled: false
