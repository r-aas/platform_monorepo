# ═══════════════════════════════════════════════════════
# MCPServer CRDs — managed by kmcp controller
# Each MCPServer creates: Deployment + Service + ConfigMap
# secretRefs mounts ALL keys from a Secret as env vars
# ═══════════════════════════════════════════════════════
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-kubernetes
  namespace: {{ .Release.Namespace }}
spec:
  deployment:
    image: ghcr.io/r-aas/mcp-kubernetes:latest
    port: 3000
    env:
      PORT: "3000"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    serviceAccountName: genai-mcp-kubernetes
  transportType: http
  httpTransport:
    targetPort: 3000
  timeout: 30s
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-mlflow
  namespace: {{ .Release.Namespace }}
spec:
  deployment:
    image: ghcr.io/r-aas/mcp-mlflow:latest
    port: 3000
    env:
      PORT: "3000"
      MLFLOW_TRACKING_URI: http://genai-mlflow.genai.svc.cluster.local:5000
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  transportType: http
  httpTransport:
    targetPort: 3000
  timeout: 30s
---
