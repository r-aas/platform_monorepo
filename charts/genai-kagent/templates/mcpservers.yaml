apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-gitlab
  namespace: {{ .Release.Namespace }}
spec:
  deployment:
    image: node:24-alpine
    port: 3000
    cmd: "sh"
    args:
      - "-c"
      - "npx -y @structured-world/gitlab-mcp"
    env:
      GITLAB_API_URL: http://gitlab-ce.platform.svc.cluster.local:8181
      HOST: "0.0.0.0"
      PORT: "3000"
    secretRefs:
      - name: mcp-gitlab-env
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi
  transportType: http
  httpTransport:
    targetPort: 3000
  timeout: 30s
