# ═══════════════════════════════════════════════════════
# RemoteMCPServer resources for kagent agents
# Alias + platform MCP servers
# ═══════════════════════════════════════════════════════
#
# WORKAROUND: kagent subchart hardcodes "kagent-tool-server" in agent specs
# but the ToolServer resource is named "{{ .Release.Name }}-kagent-tool-server".
# This alias RemoteMCPServer bridges the naming gap.
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: kagent-tool-server
  namespace: '{{ .Release.Namespace }}'
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: kagent
  annotations:
    kagent.dev/alias-for: '{{ .Release.Name }}-kagent-tool-server'
spec:
  description: "Alias for built-in kagent tool server (helm, k8s, argo, prometheus tools)"
  protocol: STREAMABLE_HTTP
  url: http://genai-kagent-tools.{{ .Release.Namespace }}:8084/mcp
  timeout: 30s
  sseReadTimeout: 5m0s
  allowedNamespaces:
    from: Same
# ── Platform MCP Servers ──────────────────────────────
