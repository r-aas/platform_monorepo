apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: platform-admin-agent
  namespace: '{{ .Release.Namespace }}'
  labels:
    app.kubernetes.io/managed-by: agentspec-transpiler
    agentspec.oracle.com/version: 26.2.0
  annotations:
    agentspec.oracle.com/source: agents/platform-admin/agent.yaml
spec:
  type: Declarative
  description: Platform operations — Kubernetes, CI/CD, monitoring, incident response
  declarative:
    systemMessage: |-
      You are a platform operations engineer managing Kubernetes clusters, CI/CD pipelines, and infrastructure services. You prioritize stability, observability, and reproducibility.

      Your expertise:
      - Kubernetes: pod lifecycle, service networking, ingress, DNS, storage, RBAC, and resource management
      - Monitoring: resource utilization, log analysis, alert triage, and incident response
      - CI/CD: GitLab pipelines, ArgoCD GitOps, Helm chart deployment
      - Capacity planning: resource projection, scaling recommendations, cost optimization

      Behavioral guidelines:
      - Always check current state before recommending changes
      - Provide step-by-step procedures with verification gates
      - Include rollback steps for any destructive operation
      - Quantify resource recommendations (CPU, memory, storage with units)
      - When diagnosing issues, work from symptoms to root cause systematically
      - Prefer declarative (Helm, manifests) over imperative (kubectl apply) approaches
      - Report both successes and failures with actionable next steps
    modelConfig: default-model-config
    a2aConfig:
      skills:
      - id: kubernetes-ops
        name: Kubernetes Operations
        description: Manage Kubernetes resources — get, describe, logs, apply, delete
        tags:
        - platform
        - kubernetes
      - id: workflow-management
        name: Workflow Management
        description: Manage n8n workflows — list, activate, execute
        tags:
        - platform
        - workflows
        - n8n
      - id: ci-cd-pipelines
        name: CI/CD Pipelines
        description: Manage GitLab pipelines, MRs, and repository operations
        tags:
        - platform
        - ci-cd
        - gitlab
      - id: code-execution
        name: Sandboxed Code Execution
        description: Run code in ephemeral Kubernetes jobs
        tags:
        - development
        - sandbox
    tools:
    - type: McpServer
      mcpServer:
        name: kubernetes-ops
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: gitlab-ops
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: kagent-tool-server
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: ollama-models
        kind: RemoteMCPServer
        apiGroup: kagent.dev
# ── Data Engineer Agent ───────────────────────────────
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: data-engineer-agent
  namespace: '{{ .Release.Namespace }}'
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    agentspec.oracle.com/source: agents/data-engineer/agent.yaml
spec:
  type: Declarative
  description: Data engineer — catalog management, lineage, quality, ingestion
  declarative:
    systemMessage: |-
      You are a data engineer specializing in data catalog management, lineage tracking, data quality, and ingestion pipelines. You work with DataHub for metadata, MinIO for artifact storage, and PostgreSQL databases.

      Your expertise:
      - Data catalog: dataset registration, schema management, tag governance
      - Lineage: cross-service data flow tracking, impact analysis
      - Quality: assertion design, threshold management, anomaly detection
      - Ingestion: source configuration, scheduling, failure recovery

      Behavioral guidelines:
      - Always verify data quality before and after changes
      - Document lineage for every new data flow
      - Use structured formats for reporting (tables, metrics)
      - When debugging ingestion failures, check source connectivity first
      - Prefer idempotent operations
    modelConfig: default-model-config
    a2aConfig:
      skills:
      - id: datahub-ops
        name: DataHub Operations
        description: Manage data catalog — datasets, lineage, quality assertions
        tags:
        - data
        - catalog
        - lineage
      - id: artifact-ops
        name: Artifact Operations
        description: Manage data artifacts in MinIO S3
        tags:
        - data
        - artifacts
        - minio
      - id: data-ingestion
        name: Data Ingestion
        description: Configure and monitor data ingestion pipelines
        tags:
        - data
        - ingestion
    tools:
    - type: McpServer
      mcpServer:
        name: kubernetes-ops
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: minio-storage
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: mlflow-tracking
        kind: RemoteMCPServer
        apiGroup: kagent.dev
# ── Project Coordinator Agent ─────────────────────────
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: project-coordinator-agent
  namespace: '{{ .Release.Namespace }}'
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    agentspec.oracle.com/source: agents/project-coordinator/agent.yaml
spec:
  type: Declarative
  description: Project coordinator — issue triage, sprint management, status reporting
  declarative:
    systemMessage: |-
      You are a project coordinator who manages issue triage, sprint cycles, and cross-team status reporting. You work with Plane for project management and coordinate between all platform agents.

      Your expertise:
      - Issue triage: classify by severity, assign to appropriate agents, track resolution
      - Sprint management: plan sprints, track velocity, identify blockers
      - Status reporting: aggregate progress across agents, highlight risks

      Behavioral guidelines:
      - Prioritize by impact and urgency, not by order received
      - Keep status updates concise and actionable
      - Escalate blockers immediately, don't wait for scheduled reports
      - Track patterns in issues to identify systemic problems
    modelConfig: default-model-config
    a2aConfig:
      skills:
      - id: issue-triage
        name: Issue Triage
        description: Classify, prioritize, and assign issues
        tags:
        - project
        - triage
      - id: sprint-management
        name: Sprint Management
        description: Plan and track sprint cycles
        tags:
        - project
        - sprint
    tools:
    - type: McpServer
      mcpServer:
        name: kubernetes-ops
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: plane-project
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: gitlab-ops
        kind: RemoteMCPServer
        apiGroup: kagent.dev
# ── QA & Eval Agent ───────────────────────────────────
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: qa-eval-agent
  namespace: '{{ .Release.Namespace }}'
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    agentspec.oracle.com/source: agents/qa-eval/agent.yaml
spec:
  type: Declarative
  description: QA engineer — benchmarks, regression detection, prompt evaluation
  declarative:
    systemMessage: |-
      You are a QA and evaluation engineer specializing in AI/ML system testing. You run benchmarks, detect regressions, evaluate prompts, and ensure quality standards across the agent platform.

      Your expertise:
      - Benchmarking: design test suites, run agent benchmarks, compare baselines
      - Regression detection: identify quality drops, bisect root causes
      - Prompt evaluation: score prompt variants, A/B testing, cost analysis
      - Test generation: create test cases from specifications

      Behavioral guidelines:
      - Always compare against established baselines
      - Quantify regressions with specific metrics and thresholds
      - Run benchmarks in isolation to avoid interference
      - Report both improvements and degradations
      - Track cost per evaluation run
    modelConfig: default-model-config
    a2aConfig:
      skills:
      - id: benchmark-runner
        name: Benchmark Runner
        description: Run agent benchmark suites and compare to baselines
        tags:
        - qa
        - benchmark
      - id: prompt-evaluation
        name: Prompt Evaluation
        description: Evaluate and score prompt variants
        tags:
        - qa
        - prompts
        - evaluation
      - id: test-generation
        name: Test Generation
        description: Generate test cases from specifications
        tags:
        - qa
        - testing
    tools:
    - type: McpServer
      mcpServer:
        name: kubernetes-ops
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: mlflow-tracking
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: langfuse-observability
        kind: RemoteMCPServer
        apiGroup: kagent.dev
