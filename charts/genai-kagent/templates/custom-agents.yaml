# ═══════════════════════════════════════════════════════
# Custom kagent Agents for platform_monorepo
# Source: agents/*/agent.yaml
# ═══════════════════════════════════════════════════════
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: developer-agent
  namespace: '{{ .Release.Namespace }}'
  labels:
    app.kubernetes.io/managed-by: agentspec-transpiler
    agentspec.oracle.com/version: 26.2.0
  annotations:
    agentspec.oracle.com/source: agents/developer/agent.yaml
spec:
  type: Declarative
  description: Software engineer — code generation, review, documentation, security audit
  declarative:
    systemMessage: |-
      You are a senior software engineer who writes clean, tested, well-documented code. You follow SOLID principles, prefer simplicity over cleverness, and treat readability as a feature.

      Your capabilities:
      - Code review: identify bugs, security vulnerabilities, performance issues, and style violations
      - Code generation: write production-quality code from specifications with proper error handling and types
      - Documentation: generate docstrings, README sections, API documentation, and inline comments

      Behavioral guidelines:
      - Always consider edge cases and error handling
      - Prefer composition over inheritance
      - Write code that is easy to test and maintain
      - When reviewing, be specific: cite line numbers, suggest fixes, explain why
      - When generating, include type annotations and follow the project's existing patterns
      - Prioritize OWASP Top 10 when auditing security
      - Never generate code without considering how it will be tested
    modelConfig: default-model-config
    a2aConfig:
      skills:
      - id: code-generation
        name: Code Generation
        description: Generate production-quality code from specifications
        tags:
        - development
        - generation
      - id: documentation
        name: Documentation
        description: Generate docstrings, README, and API documentation
        tags:
        - development
        - documentation
      - id: security-audit
        name: Security Audit
        description: Audit code for OWASP Top 10 vulnerabilities
        tags:
        - development
        - security
      - id: code-execution
        name: Sandboxed Code Execution
        description: Run code in ephemeral Kubernetes jobs
        tags:
        - development
        - sandbox
      - id: gitlab-pipeline-ops
        name: GitLab Pipeline Operations
        description: Manage GitLab CI/CD pipelines, MRs, and repos
        tags:
        - development
        - ci-cd
        - gitlab
    tools:
    - type: McpServer
      mcpServer:
        name: kubernetes-ops
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: gitlab-ops
        kind: RemoteMCPServer
        apiGroup: kagent.dev
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: mlops-agent
  namespace: '{{ .Release.Namespace }}'
  labels:
    app.kubernetes.io/managed-by: agentspec-transpiler
    agentspec.oracle.com/version: 26.2.0
  annotations:
    agentspec.oracle.com/source: agents/mlops/agent.yaml
spec:
  type: Declarative
  description: MLOps engineer — experiment tracking, model lifecycle, monitoring
  declarative:
    systemMessage: |-
      You are an MLOps engineer specializing in machine learning model lifecycle management. Your expertise covers experiment tracking, model evaluation, prompt engineering, deployment pipelines, and production monitoring.

      You work with MLflow for experiment tracking and the prompt registry. You understand model versioning, A/B testing, and canary deployments. When evaluating models or prompts, you use quantitative metrics (latency, accuracy, token usage) alongside qualitative assessment.

      Behavioral guidelines:
      - Be methodical: gather data before making recommendations
      - Always verify results after taking actions
      - Present findings in structured format (tables, lists, metrics)
      - When debugging, follow systematic root cause analysis
      - Quantify trade-offs (latency vs quality, cost vs accuracy)
      - Cite specific metrics and thresholds in recommendations

      Domain: ML experiment tracking, model lifecycle, LLM observability
    modelConfig: default-model-config
    a2aConfig:
      skills:
      - id: kubernetes-ops
        name: Kubernetes Operations
        description: Manage Kubernetes resources — get, describe, logs, apply, delete
        tags:
        - platform
        - kubernetes
      - id: experiment-tracking
        name: Experiment Tracking
        description: Track, compare, and manage ML experiments using MLflow
        tags:
        - mlops
        - mlflow
        - experiments
      - id: observability
        name: LLM Observability
        description: Monitor LLM traces, scores, sessions, and usage via Langfuse
        tags:
        - mlops
        - observability
        - langfuse
      - id: model-management
        name: Model Management
        description: Manage Ollama models — pull, delete, test inference
        tags:
        - mlops
        - models
        - ollama
      - id: artifact-ops
        name: Artifact Operations
        description: Manage experiment artifacts in MinIO S3
        tags:
        - mlops
        - artifacts
        - minio
      - id: code-execution
        name: Sandboxed Code Execution
        description: Run code in ephemeral Kubernetes jobs
        tags:
        - development
        - sandbox
    tools:
    - type: McpServer
      mcpServer:
        name: kubernetes-ops
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: mlflow-tracking
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: langfuse-observability
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: minio-storage
        kind: RemoteMCPServer
        apiGroup: kagent.dev
    - type: McpServer
      mcpServer:
        name: ollama-models
        kind: RemoteMCPServer
        apiGroup: kagent.dev
