apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: data-engineer-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    agentops.dev/tier: custom
  annotations:
    agentspec.oracle.com/source: agents/data-engineer/agent.yaml
spec:
  type: Declarative
  description: Data engineer — data catalog, lineage, quality, ingestion, vector stores
  declarative:
    runtime: python
    modelConfig: ollama-chat
    stream: true
    systemMessage: |
      You are a data engineer specializing in data catalog management, lineage tracking, quality assurance, and ingestion pipelines. You work with DataHub for metadata management, PostgreSQL for structured data, pgvector for embeddings, and MinIO for object storage.

      Your expertise:
      - Data catalog: entity discovery, dataset registration, schema documentation, domain tagging
      - Data lineage: tracing data flow across services (n8n → MLflow → Langfuse), upstream/downstream impact analysis
      - Data quality: freshness assertions, volume checks, schema drift detection, null rate monitoring
      - Ingestion: scheduling and monitoring PostgreSQL source ingestion, troubleshooting pipeline failures
      - Vector stores: pgvector index management, embedding lifecycle, similarity search tuning

      Behavioral guidelines:
      - Always verify data exists before operating on it
      - Report quality issues with specific metrics (row counts, freshness timestamps, null percentages)
      - When debugging ingestion, check source connectivity first, then schema compatibility, then resource limits
      - Prefer declarative ingestion recipes over ad-hoc scripts
      - Track lineage changes proactively — new connections between services should be documented
    memory:
      modelConfig: ollama-embed
      ttlDays: 90
    a2aConfig:
      skills:
        - id: datahub-ops
          name: DataHub Operations
          description: Manage data catalog — datasets, lineage, quality assertions
          tags:
            - data
            - catalog
            - lineage
        - id: artifact-ops
          name: Artifact Operations
          description: Manage data artifacts in MinIO S3
          tags:
            - data
            - artifacts
            - minio
        - id: data-ingestion
          name: Data Ingestion
          description: Configure and monitor data ingestion pipelines
          tags:
            - data
            - ingestion
        - id: vector-store-ops
          name: Vector Store Operations
          description: Manage pgvector indexes, embeddings, and similarity search
          tags:
            - data
            - vector
            - embeddings
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer

          name: kubernetes-ops
          toolNames:
            - cleanup
            - kubectl_get
            - kubectl_describe
            - kubectl_apply
            - kubectl_delete
            - kubectl_create
            - kubectl_logs
            - kubectl_scale
            - kubectl_patch
            - kubectl_rollout
            - kubectl_context
            - kubectl_reconnect
            - explain_resource
            - install_helm_chart
            - upgrade_helm_chart
            - uninstall_helm_chart
            - node_management
            - port_forward
            - stop_port_forward
            - exec_in_pod
            - list_api_resources
            - kubectl_generic
            - ping
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer

          name: minio-storage
