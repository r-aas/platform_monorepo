apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: platform-admin-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    agentops.dev/tier: custom
  annotations:
    agentspec.oracle.com/source: agents/platform-admin/agent.yaml
spec:
  type: Declarative
  description: Platform operations — Kubernetes, CI/CD, monitoring, incident response
  declarative:
    runtime: python
    modelConfig: ollama-chat
    stream: true
    systemMessage: |
      You are a platform operations engineer managing Kubernetes clusters, CI/CD pipelines, and infrastructure services. You prioritize stability, observability, and reproducibility.

      Your expertise:
      - Kubernetes: pod lifecycle, service networking, ingress, DNS, storage, RBAC, and resource management
      - Monitoring: resource utilization, log analysis, alert triage, and incident response
      - CI/CD: GitLab pipelines, ArgoCD GitOps, Helm chart deployment
      - Capacity planning: resource projection, scaling recommendations, cost optimization

      Behavioral guidelines:
      - Always check current state before recommending changes
      - Provide step-by-step procedures with verification gates
      - Include rollback steps for any destructive operation
      - Quantify resource recommendations (CPU, memory, storage with units)
      - When diagnosing issues, work from symptoms to root cause systematically
      - Prefer declarative (Helm, manifests) over imperative (kubectl apply) approaches
      - Report both successes and failures with actionable next steps
    memory:
      modelConfig: ollama-embed
      ttlDays: 30
    a2aConfig:
      skills:
        - id: kubernetes-ops
          name: Kubernetes Operations
          description: Manage Kubernetes resources — get, describe, logs, apply, delete
          tags:
            - platform
            - kubernetes
        - id: gitlab-pipeline-ops
          name: GitLab Pipeline Operations
          description: Manage GitLab CI/CD pipelines, MRs, and repos
          tags:
            - platform
            - ci-cd
            - gitlab
        - id: model-management
          name: Model Management
          description: Manage Ollama models — pull, delete, test inference
          tags:
            - platform
            - models
            - ollama
        - id: incident-response
          name: Incident Response
          description: Triage and remediate infrastructure incidents
          tags:
            - platform
            - operations
            - incidents
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kubernetes-ops
          toolNames:
            - cleanup
            - kubectl_get
            - kubectl_describe
            - kubectl_apply
            - kubectl_delete
            - kubectl_create
            - kubectl_logs
            - kubectl_scale
            - kubectl_patch
            - kubectl_rollout
            - kubectl_context
            - kubectl_reconnect
            - explain_resource
            - install_helm_chart
            - upgrade_helm_chart
            - uninstall_helm_chart
            - node_management
            - port_forward
            - stop_port_forward
            - exec_in_pod
            - list_api_resources
            - kubectl_generic
            - ping
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: gitlab-ops
          toolNames:
            - browse_projects
            - browse_namespaces
            - browse_commits
            - browse_events
            - browse_users
            - browse_todos
            - manage_project
            - manage_namespace
            - manage_todos
            - manage_context
            - browse_labels
            - manage_label
            - browse_merge_requests
            - browse_mr_discussions
            - manage_merge_request
            - manage_mr_discussion
            - manage_draft_notes
            - browse_files
            - manage_files
            - browse_milestones
            - manage_milestone
            - browse_pipelines
            - manage_pipeline
            - manage_pipeline_job
            - browse_variables
            - manage_variable
            - browse_wiki
            - manage_wiki
            - browse_work_items
            - manage_work_item
            - browse_snippets
            - manage_snippet
            - browse_webhooks
            - manage_webhook
            - browse_integrations
            - manage_integration
            - browse_releases
            - manage_release
            - browse_refs
            - manage_ref
            - browse_members
            - manage_member
            - browse_search
            - browse_iterations
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: ollama-models
          toolNames:
            - list_models
