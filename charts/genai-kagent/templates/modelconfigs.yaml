# ═══════════════════════════════════════════════════════
# ModelConfig CRDs — direct Ollama (no LiteLLM proxy)
# kagent agents talk to Ollama at 192.168.5.2:11434
# (Colima VM gateway to Mac host running Ollama natively)
# ═══════════════════════════════════════════════════════
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: ollama-chat
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  provider: Ollama
  model: glm-4.7-flash
  ollama:
    host: "http://192.168.5.2:11434"
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: ollama-embed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  provider: Ollama
  model: nomic-embed-text
  ollama:
    host: "http://192.168.5.2:11434"
