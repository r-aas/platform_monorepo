replicaCount: 1

image:
  repository: open-ontologies
  tag: "latest"
  pullPolicy: IfNotPresent

server:
  port: 8080

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: open-ontologies.genai.127.0.0.1.nip.io

# Ontology files mounted as ConfigMap.
# Populated by: task ontology-sync (copies from ontology/*.ttl)
ontology:
  enabled: true
  data: {}
  # data:
  #   platform.ttl: |
  #     @prefix ...
  #   platform-shapes.ttl: |
  #     @prefix ...

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: "1.0"

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 5
